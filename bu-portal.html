document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ipt src=\"c3cc3a76-150f-4122-9923-5731823165c4\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0;background:#f1f2f4;font-family:'Be Vietnam Pro',system-ui,-apple-system,sans-serif;color:#17191f;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n  @keyframes bupulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.3}}\n  @keyframes bupop{0%{transform:scale(.94);opacity:0}100%{transform:scale(1);opacity:1}}\n  .bu-in{width:100%;padding:11px 13px;border:1px solid #dfe1e6;border-radius:9px;font-size:13.5px;outline:none;font-family:inherit;background:#fff;color:#17191f;transition:.12s}\n  .bu-in:focus{border-color:#17191f;box-shadow:0 0 0 3px rgba(23,25,31,.07)}\n  .bu-lab{font-size:12px;font-weight:600;color:#3b3f4a;display:block;margin-bottom:6px}\n  .mono{font-family:'Spline Sans Mono',ui-monospace,monospace}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"display:flex;min-height:100vh;background:#f1f2f4\">\n\n  <!-- SIDEBAR -->\n  <aside style=\"width:248px;flex-shrink:0;background:#17191f;color:#c8cad2;display:flex;flex-direction:column;position:sticky;top:0;height:100vh\">\n    <div style=\"display:flex;align-items:center;gap:12px;padding:22px 20px;border-bottom:1px solid rgba(255,255,255,.08)\">\n      <div style=\"width:38px;height:38px;border-radius:9px;background:#fff;color:#17191f;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;letter-spacing:.5px\">FM<\u002Fdiv>\n      <div style=\"line-height:1.2\">\n        <b style=\"color:#fff;font-size:13.5px;display:block;letter-spacing:-.2px\">Marketing Services<\u002Fb>\n        <span style=\"font-size:10px;color:#7f8493;letter-spacing:1.4px;font-weight:600\">REQUEST PORTAL<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <nav style=\"padding:16px 12px;flex:1\">\n      <div style=\"font-size:10px;color:#6b7080;letter-spacing:1.6px;padding:8px 12px 8px;font-weight:700\">CỔNG YÊU CẦU BU<\u002Fdiv>\n      <sc-for list=\"{{ nav }}\" as=\"n\" hint-placeholder-count=\"3\">\n        <div onclick=\"{{ n.onClick }}\" style=\"display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:8px;font-size:13.5px;font-weight:{{ n.weight }};margin-bottom:3px;cursor:pointer;color:{{ n.color }};background:{{ n.bg }};border-left:2px solid {{ n.border }}\">\n          <span style=\"width:18px;text-align:center;font-size:14px\">{{ n.icon }}<\u002Fspan>\n          <span>{{ n.label }}<\u002Fspan>\n          <sc-if value=\"{{ n.hasBadge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:auto;font-size:10.5px;font-weight:700;background:rgba(255,255,255,.14);color:#fff;padding:1px 8px;border-radius:999px\">{{ n.badge }}<\u002Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fnav>\n    <div style=\"padding:15px 18px;border-top:1px solid rgba(255,255,255,.08)\">\n      <div style=\"font-size:11px;color:#9398a3;line-height:1.6\">Đội Marketing tự quản lý hàng đợi theo năng lực. Yêu cầu của bạn được ghi nhận tự động.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- MAIN -->\n  <main style=\"flex:1;min-width:0;display:flex;flex-direction:column\">\n\n    <!-- TOP BAR -->\n    <div style=\"background:#fff;border-bottom:1px solid #e3e5ea;padding:16px 40px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:20\">\n      <div>\n        <div style=\"font-size:18px;font-weight:800;letter-spacing:-.4px;line-height:1.2\">{{ viewTitle }}<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#8c909c;margin-top:1px\">{{ viewSub }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-left:auto;display:flex;align-items:center;gap:12px\">\n        <div style=\"display:flex;align-items:center;gap:8px;padding:7px 14px;border:1px solid #e3e5ea;border-radius:999px;font-size:12px;font-weight:600;color:#3b3f4a\">\n          <span style=\"width:8px;height:8px;border-radius:50%;background:{{ availPill.dot }};display:inline-block\"><\u002Fspan>{{ availPill.label }}\n        <\u002Fdiv>\n        <a href=\"index.html\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:7px;padding:7px 14px;border:1px solid #e3e5ea;border-radius:999px;font-size:12px;font-weight:600;color:#3b3f4a;cursor:pointer;text-decoration:none\">\n          <span>⇆<\u002Fspan>Quản trị MKT\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:28px 40px 70px;max-width:1120px;width:100%\">\n\n      <!-- ========== SUBMIT VIEW ========== -->\n      <sc-if value=\"{{ isSubmit }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n\n          <!-- CONFIRMATION -->\n          <sc-if value=\"{{ hasConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#fff;border:1px solid #e3e5ea;border-radius:16px;padding:36px 40px;box-shadow:0 8px 30px rgba(23,25,31,.06);animation:bupop .25s ease;max-width:680px;margin:0 auto\">\n              <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px\">\n                <div style=\"width:46px;height:46px;border-radius:50%;background:{{ cf.bg }};display:flex;align-items:center;justify-content:center;font-size:22px;color:{{ cf.color }};flex-shrink:0\">{{ cf.icon }}<\u002Fdiv>\n                <div>\n                  <div style=\"font-size:20px;font-weight:800;letter-spacing:-.4px\">Đã ghi nhận yêu cầu<\u002Fdiv>\n                  <div style=\"font-size:13px;color:#8c909c\">Service Management sẽ xử lý theo thứ tự hàng đợi.<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#fafbfc;border:1px solid #eef0f3;border-radius:11px;margin-bottom:14px\">\n                <div>\n                  <div style=\"font-size:10.5px;font-weight:700;color:#8c909c;letter-spacing:.5px;text-transform:uppercase\">Mã yêu cầu<\u002Fdiv>\n                  <div class=\"mono\" style=\"font-size:17px;font-weight:600;letter-spacing:.5px;margin-top:3px\">{{ cf.ticket }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:700;background:{{ cf.bg }};color:{{ cf.color }}\">\n                  <span style=\"width:8px;height:8px;border-radius:50%;background:{{ cf.color }}\"><\u002Fspan>{{ cf.badge }}\n                <\u002Fspan>\n              <\u002Fdiv>\n\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px\">\n                <div style=\"padding:13px 16px;border:1px solid #eef0f3;border-radius:11px\">\n                  <div style=\"font-size:10.5px;font-weight:700;color:#8c909c;letter-spacing:.4px;text-transform:uppercase\">Vị trí hàng đợi<\u002Fdiv>\n                  <div style=\"font-size:17px;font-weight:800;margin-top:3px\">{{ cf.posLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"padding:13px 16px;border:1px solid #eef0f3;border-radius:11px\">\n                  <div style=\"font-size:10.5px;font-weight:700;color:#8c909c;letter-spacing:.4px;text-transform:uppercase\">Dự kiến bắt đầu<\u002Fdiv>\n                  <div style=\"font-size:17px;font-weight:800;margin-top:3px\">{{ cf.estLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;align-items:center;gap:9px;padding:11px 15px;border-radius:10px;background:{{ cf.sheetBg }};margin-bottom:24px\">\n                <span style=\"font-size:14px\">{{ cf.sheetIcon }}<\u002Fspan>\n                <span style=\"font-size:12.5px;font-weight:600;color:{{ cf.sheetColor }}\">{{ cf.sheetLabel }}<\u002Fspan>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;gap:11px\">\n                <button onclick=\"{{ newRequest }}\" style=\"flex:1;padding:13px;background:#17191f;color:#fff;border:none;border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit\">Gửi yêu cầu khác<\u002Fbutton>\n                <button onclick=\"{{ goQueue }}\" style=\"flex:1;padding:13px;background:#fff;color:#17191f;border:1px solid #dfe1e6;border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit\">Xem trong hàng đợi →<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- FORM + PREDICTION -->\n          <sc-if value=\"{{ notConfirm }}\" hint-placeholder-val=\"{{ true }}\">\n            <div>\n              <!-- WHY ONE INTAKE -->\n              <div style=\"background:#17191f;border-radius:16px;padding:26px 30px;margin-bottom:18px;color:#fff\">\n                <div style=\"font-size:10.5px;font-weight:700;letter-spacing:1.4px;color:#8c909c;text-transform:uppercase;margin-bottom:9px\">Cổng yêu cầu Marketing · một đầu mối duy nhất<\u002Fdiv>\n                <div style=\"font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.25;margin-bottom:8px;white-space:nowrap\">Gửi mọi yêu cầu về một nơi — minh bạch, công bằng, đúng thứ tự<\u002Fdiv>\n                <div style=\"font-size:13px;color:#b7bac4;line-height:1.6;max-width:560px;text-wrap:pretty\">Không còn nhắn tin rải rác hay nhờ vả cá nhân. Mọi việc vào chung một hàng đợi, có mã theo dõi, đội tự điều phối theo năng lực.<\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;margin-top:22px\">\n                  <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:15px 16px\">\n                    <div style=\"width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:11px\">▣<\u002Fdiv>\n                    <div style=\"font-size:13px;font-weight:700;margin-bottom:3px\">Không thất lạc<\u002Fdiv>\n                    <div style=\"font-size:11.5px;color:#9398a3;line-height:1.5\">Mỗi yêu cầu có mã ticket riêng để theo dõi<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:15px 16px\">\n                    <div style=\"width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:11px\">⚖<\u002Fdiv>\n                    <div style=\"font-size:13px;font-weight:700;margin-bottom:3px\">Công bằng<\u002Fdiv>\n                    <div style=\"font-size:11.5px;color:#9398a3;line-height:1.5\">Xếp theo năng lực &amp; độ ưu tiên, không chen ngang<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:15px 16px\">\n                    <div style=\"width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:11px\">◉<\u002Fdiv>\n                    <div style=\"font-size:13px;font-weight:700;margin-bottom:3px\">Minh bạch<\u002Fdiv>\n                    <div style=\"font-size:11.5px;color:#9398a3;line-height:1.5\">Thấy ngay vị trí hàng đợi &amp; ngày bắt đầu dự kiến<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:15px 16px\">\n                    <div style=\"width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:11px\">➜<\u002Fdiv>\n                    <div style=\"font-size:13px;font-weight:700;margin-bottom:3px\">Nhanh hơn<\u002Fdiv>\n                    <div style=\"font-size:11.5px;color:#9398a3;line-height:1.5\">Đội tự điều phối, bỏ qua các tầng tActive }}<\u002Fdiv><div style=\"font-size:10.5px;font-weight:700;color:#8c909c;letter-spacing:.3px;text-transform:uppercase\">Đang làm<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-size:22px;font-weight:800;letter-spacing:-.8px;color:#b58a3a\">{{ statQueue }}<\u002Fdiv><div style=\"font-size:10.5px;font-weight:700;color:#8c909c;letter-spacing:.3px;text-transform:uppercase\">Hàng đợi<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-size:22px;font-weight:800;letter-spacing:-.8px;color:#17191f\">{{ statWaitLabel }}<\u002Fdiv><div style=\"font-size:10.5px;font-weight:700;color:#8c909c;letter-spacing:.3px;text-transform:uppercase\">Chờ lâu nhất<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;flex-wrap:wrap;gap:18px;align-items:flex-start\">\n                <!-- FORM -->\n                <form ref=\"{{ formRef }}\" onsubmit=\"{{ onSubmit }}\" style=\"flex:1 1 420px;background:#fff;border:1px solid #e3e5ea;border-radius:14px;padding:24px 26px\">\n\n                  <div style=\"display:flex;align-items:flex-start;gap:10px;background:#eef3f9;border:1px solid #d8e3ef;border-radius:10px;padding:11px 14px;margin-bottom:18px\">\n                    <span style=\"width:18px;height:18px;border-radius:50%;background:#345e8a;color:#fff;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px\">i<\u002Fspan>\n                    <div style=\"font-size:12px;color:#345e8a;line-height:1.55\">Chưa rõ cần Function nào hay làm thế nào? Ở mục <b>Function cần hỗ trợ<\u002Fb> chọn <b>“Chưa rõ — cần tư vấn”<\u002Fb> — MKT Services sẽ phản hồi &amp; tư vấn trước khi xếp việc.<\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.8px;color:#8c909c;text-transform:uppercase;margin-bottom:14px\">1 · Thông tin yêu cầu<\u002Fdiv>\n                  <div style=\"margin-bottom:14px\">\n                    <label class=\"bu-lab\">Tiêu đề task <span style=\"color:#b4524f\">*<\u002Fspan><\u002Flabel>\n                    <input class=\"bu-in\" name=\"title\" oninput=\"{{ onField }}\" placeholder=\"VD: Chạy Google Ads ra mắt sản phẩm tháng 7\" autocomplete=\"off\">\n                  <\u002Fdiv>\n                  <div style=\"margin-bottom:14px\">\n                    <label class=\"bu-lab\">Mô tả chi tiết <span style=\"color:#b4524f\">*<\u002Fspan><\u002Flabel>\n                    <textarea class=\"bu-in\" name=\"desc\" oninput=\"{{ onField }}\" rows=\"4\" placeholder=\"Mục tiêu, đối tượng, sản phẩm/dịch vụ, thông điệp chính, KPI mong muốn, ràng buộc…\" autocomplete=\"off\" style=\"resize:vertical;line-height:1.5\"><\u002Ftextarea>\n                    <div style=\"font-size:11px;color:#9aa0ac;margin-top:6px;line-height:1.5\">Mô tả càng rõ, MKT Services càng đánh giá đúng nhu cầu và trả kết quả làm bạn hài lòng.<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:12px;margin-bottom:6px;flex-wrap:wrap\">\n                    <div style=\"flex:1 1 180px\">\n                      <label class=\"bu-lab\">Business Unit <span style=\"color:#b4524f\">*<\u002Fspan><\u002Flabel>\n                      <select class=\"bu-in\" name=\"bu\" onchange=\"{{ onField }}\">\n                        <option value=\"\">— Chọn BU —<\u002Foption>\n                        <option>Proship<\u002Foption><option>Ratraco<\u002Foption><option>MICAFI<\u002Foption><option>FDS<\u002Foption>\n                        <option>Fado168<\u002Foption><option>EuroGo<\u002Foption><option>Fado VN<\u002Foption><option>The Winds<\u002Foption>\n                        <option>GoPrint<\u002Foption><option>Internal Project<\u002Foption><option>BOD/CEO<\u002Foption>\n                      <\u002Fselect>\n                    <\u002Fdiv>\n                    <div style=\"flex:1 1 180px\">\n                      <label class=\"bu-lab\">Người liên hệ<\u002Flabel>\n                      <input class=\"bu-in\" name=\"requester\" oninput=\"{{ onField }}\" placeholder=\"Tên / email của bạn\" autocomplete=\"off\">\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <div style=\"height:1px;background:#eef0f3;margin:18px 0\"><\u002Fdiv>\n                  <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.8px;color:#8c909c;text-transform:uppercase;margin-bottom:14px\">2 · Phạm vi &amp; ưu tiên<\u002Fdiv>\n                  <div style=\"display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap\">\n                    <div style=\"flex:1 1 180px\">\n                      <label class=\"bu-lab\">Function cần hỗ trợ <span style=\"color:#b4524f\">*<\u002Fspan><\u002Flabel>\n                      <select class=\"bu-in\" name=\"func\" onchange=\"{{ onField }}\">\n                        <option value=\"\">— Chọn Function —<\u002Foption>\n                        <option>Performance<\u002Foption><option>Content &amp; Creative<\u002Foption><option>Marketing Operation<\u002Foption>\n                        <option>Marketing Strategy<\u002Foption><option>Growth &amp; Innovation<\u002Foption>\n                        <option value=\"__consult\">Chưa rõ — cần tư vấn (MKT Services hỗ trợ)<\u002Foption>\n                      <\u002Fselect>\n                    <\u002Fdiv>\n                    <div style=\"flex:1 1 180px\">\n                      <label class=\"bu-lab\">Quy mô ước tính<\u002Flabel>\n                      <select class=\"bu-in\" name=\"cx\" onchange=\"{{ onField }}\">\n                        <option value=\"X\">Rất nhỏ · dưới 2 giờ<\u002Foption>\n                        <option value=\"S\">Nhỏ · ~1 ngày<\u002Foption>\n                        <option value=\"M\" selected=\"\">Vừa · vài ngày<\u002Foption>\n                        <option value=\"L\">Lớn · 1 tuần trở lên<\u002Foption>\n                      <\u002Fselect>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap\">\n                    <div style=\"flex:1 1 180px\">\n                      <label class=\"bu-lab\">Mức độ ưu tiên<\u002Flabel>\n                      <select class=\"bu-in\" name=\"pr\" onchange=\"{{ onField }}\">\n                        <option value=\"P3\">P3 · Bình thường<\u002Foption>\n                        <option value=\"P2\">P2 · Gấp<\u002Foption>\n                        <option value=\"P1\">P1 · Siêu gấp (chèn đầu hàng đợi)<\u002Foption>\n                        <option value=\"P4\">P4 · Thấp<\u002Foption>\n                      <\u002Fselect>\n                    <\u002Fdiv>\n                    <div style=\"flex:1 1 180px\">\n                      <label class=\"bu-lab\">Deadline mong muốn<\u002Flabel>\n                      <input class=\"bu-in\" type=\"date\" name=\"deadline\" onchange=\"{{ onField }}\">\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <div style=\"height:1px;background:#eef0f3;margin:18px 0\"><\u002Fdiv>\n                  <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.8px;color:#8c909c;text-transform:uppercase;margin-bottom:14px\">3 · Tài liệu<\u002Fdiv>\n                  <div style=\"display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap\">\n                    <div style=\"flex:1 1 180px\">\n                      <label class=\"bu-lab\">Link brief / tài liệu<\u002Flabel>\n                      <input class=\"bu-in\" name=\"brief\" oninput=\"{{ onField }}\" placeholder=\"Dán link Drive / Docs…\" autocomplete=\"off\">\n                    <\u002Fdiv>\n                    <div style=\"flex:1 1 180px\">\n                      <label class=\"bu-lab\">Ảnh đính kèm (PNG/JPG)<\u002Flabel>\n                      <input class=\"bu-in\" type=\"file\" accept=\"image/png,image/jpeg,image/webp\" onchange=\"{{ onFile }}\" style=\"padding:9px 11px;font-size:12.5px;color:#6b7080\">\n                      <div style=\"font-size:11px;color:#9aa0ac;margin-top:6px;line-height:1.5\">{{ attachHint }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <sc-if value=\"{{ hasErr }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"font-size:12.5px;color:#b4524f;font-weight:600;margin-bottom:12px\">{{ formErr }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <button type=\"submit\" style=\"width:100%;padding:14px;background:#17191f;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.2px\">Gửi yêu cầu →<\u002Fbutton>\n                <\u002Fform>\n\n                <!-- PREDICTION + RULES -->\n                <div style=\"flex:1 1 320px;position:sticky;top:90px\">\n                  <div style=\"background:{{ pr.bg }};border:1px solid {{ pr.border }};border-radius:14px;padding:20px 22px\">\n                    <div style=\"font-size:10.5px;font-weight:700;letter-spacing:1px;color:#8c909c;text-transform:uppercase;margin-bottom:12px\">Dự đoán khi gửi bây giờ<\u002Fdiv>\n                    <sc-if value=\"{{ pr.empty }}\" hint-placeholder-val=\"{{ true }}\">\n                      <div style=\"font-size:13.5px;color:#6b7080;line-height:1.6;text-wrap:pretty\">Chọn <b>Function<\u002Fb> ở form để xem yêu cầu sẽ vào làm ngay hay xếp hàng đợi.<\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ pr.has }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div>\n                        <div style=\"display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:999px;background:#fff;border:1px solid {{ pr.border }};margin-bottom:13px\">\n                          <span style=\"width:9px;height:9px;border-radius:50%;background:{{ pr.color }}\"><\u002Fspan>\n                          <span style=\"font-size:12px;font-weight:700;color:{{ pr.color }}\">{{ pr.badge }}<\u002Fspan>\n                        <\u002Fdiv>\n                        <div style=\"font-size:17px;font-weight:800;letter-spacing:-.3px;line-height:1.25;margin-bottom:6px\">{{ pr.msg }}<\u002Fdiv>\n                        <div style=\"font-size:13px;color:#5c606b;line-height:1.55;text-wrap:pretty\">{{ pr.sub }}<\u002Fdiv>\n                        <sc-if value=\"{{ pr.isQueue }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div style=\"display:flex;gap:10px;margin-top:16px\">\n                            <div style=\"flex:1;background:#fff;border:1px solid {{ pr.border }};border-radius:10px;padding:11px 13px\">\n                              <div style=\"font-size:22px;font-weight:800;letter-spacing:-1px\">#{{ pr.pos }}<\u002Fdiv>\n                              <div style=\"font-size:10.5px;font-weight:700;color:#8c909c;text-transform:uppercase;letter-spacing:.3px\">Vị trí<\u002Fdiv>\n                            <\u002Fdiv>\n                            <div style=\"flex:1.5;background:#fff;border:1px solid {{ pr.border }};border-radius:10px;padding:11px 13px\">\n                              <div style=\"font-size:15px;font-weight:800;letter-spacing:-.3px;margin-top:4px\">{{ pr.estLabel }}<\u002Fdiv>\n                              <div style=\"font-size:10.5px;font-weight:700;color:#8c909c;text-transform:uppercase;letter-spacing:.3px\">Dự kiến bắt đầu<\u002Fdiv>\n                            <\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n\n                  <div style=\"background:#fff;border:1px solid #e3e5ea;border-radius:14px;padding:16px 18px;margin-top:14px\">\n                    <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.6px;color:#8c909c;text-transform:uppercase;margin-bottom:11px\">Quy tắc xếp việc<\u002Fdiv>\n                    <div style=\"display:flex;gap:10px;margin-bottom:10px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#3f8a63;margin-top:5px;flex-shrink:0\"><\u002Fspan><div style=\"font-size:12.5px;color:#3b3f4a;line-height:1.5\">Function <b>còn chỗ trống<\u002Fb> → vào làm <b>ngay<\u002Fb>.<\u002Fdiv><\u002Fdiv>\n                    <div style=\"display:flex;gap:10px;margin-bottom:10px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#b58a3a;margin-top:5px;flex-shrink:0\"><\u002Fspan><div style=\"font-size:12.5px;color:#3b3f4a;line-height:1.5\">Function <b>kẹt<\u002Fb> → vào <b>hàng đợi<\u002Fb>, kể cả task gấp (P2).<\u002Fdiv><\u002Fdiv>\n                    <div style=\"display:flex;gap:10px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#b4524f;margin-top:5px;flex-shrink:0\"><\u002Fspan><div style=\"font-size:12.5px;color:#3b3f4a;line-height:1.5\">Chỉ <b>P1 siêu gấp<\u002Fb> được chèn lên <b>đầu hàng đợi<\u002Fb>.<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ========== CAPACITY VIEW ========== -->\n      <sc-if value=\"{{ isCapacity }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"font-size:11px;font-weight:700;color:#8c909c;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px\">Capacity by function<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:13px;margin-bottom:18px\">\n            <sc-for list=\"{{ funcCards }}\" as=\"fc\" hint-placeholder-count=\"5\">\n              <div onclick=\"{{ fc.onClick }}\" style=\"background:#fff;border:1px solid #e3e5ea;border-radius:12px;padding:16px 17px;cursor:pointer\" title=\"Lọc hàng đợi theo Function này\">\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:11px\">\n                  <span style=\"width:9px;height:9px;border-radius:50%;background:{{ fc.dot }};flex-shrink:0\"><\u002Fspan>\n                  <span style=\"font-size:13px;font-weight:700;letter-spacing:-.1px\">{{ fc.name }}<\u002Fspan>\n                  <span style=\"margin-left:auto;font-size:10.5px;font-weight:700;letter-spacing:.3px;padding:2px 8px;border-radius:5px;background:{{ fc.statusBg }};color:{{ fc.statusColor }}\">{{ fc.statusLabel }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"height:8px;background:#eef0f3;border-radius:5px;overflow:hidden;margin-bottom:9px\"><div style=\"height:100%;border-radius:5px;background:{{ fc.barColor }};width:{{ fc.pctCapped }}%\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:#6b7080;font-weight:500\"><span>{{ fc.activeCount }} active · {{ fc.queueCount }} queued<\u002Fspan><span style=\"font-weight:700;color:#3b3f4a\">{{ fc.pctLabel }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e3e5ea;border-radius:14px;padding:20px 24px\">\n            <div style=\"font-size:11px;font-weight:700;color:#8c909c;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px\">Workload by function &amp; owner<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid #e9eaee\">\n              <div style=\"width:180px;flex-shrink:0;font-size:10px;font-weight:700;color:#9aa0ac;text-transform:uppercase;letter-spacing:.4px\">Function / Owner<\u002Fdiv>\n              <div style=\"flex:1;min-width:120px;font-size:10px;font-weight:700;color:#9aa0ac;text-transform:uppercase;letter-spacing:.4px\">Load<\u002Fdiv>\n              <div style=\"width:60px;text-align:right;font-size:10px;font-weight:700;color:#9aa0ac;text-transform:uppercase;letter-spacing:.4px\">Util<\u002Fdiv>\n              <div style=\"width:160px;text-align:right;font-size:10px;font-weight:700;color:#9aa0ac;text-transform:uppercase;letter-spacing:.4px\">Credits · Queue<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ detailRows }}\" as=\"dr\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid #f1f2f5\">\n                <div style=\"width:180px;flex-shrink:0\"><div style=\"font-size:13px;font-weight:600\">{{ dr.name }}<\u002Fdiv><div style=\"font-size:11px;color:#9aa0ac;margin-top:1px\">{{ dr.members }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;min-width:120px\"><div style=\"height:9px;background:#eef0f3;border-radius:5px;overflow:hidden\"><div style=\"height:100%;border-radius:5px;background:{{ dr.barColor }};width:{{ dr.pctCapped }}%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <div style=\"width:60px;text-align:right;font-size:13px;font-weight:700;color:{{ dr.barColor }}\">{{ dr.pctLabel }}<\u002Fdiv>\n                <div style=\"width:160px;text-align:right;font-size:11.5px;color:#6b7080;font-weight:500\">{{ dr.demand }}/{{ dr.cap }} credit · {{ dr.queueCount }} queued<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"font-size:11.5px;color:#9aa0ac;margin-top:13px;line-height:1.6\">Credit = workload unit (XS 0.5 · S 1 · M 3 · L 8). A function with spare capacity takes new tasks immediately; once full, new tasks go to the queue.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ========== QUEUE VIEW ========== -->\n      <sc-if value=\"{{ isQueue }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fff;border:1px solid #e3e5ea;border-radius:14px;overflow:hidden\">\n          <div style=\"padding:16px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:1px solid #f1f2f5\">\n            <div style=\"font-size:12.5px;color:#8c909c;font-weight:600\">Thứ tự do Service Management quản lý · minh bạch giữa các BU<\u002Fdiv>\n            <div onclick=\"{{ toggleActive }}\" style=\"margin-left:auto;font-size:12px;font-weight:600;color:#3b6ea5;cursor:pointer;user-select:none\">{{ activeToggleLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:13px 22px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid #f1f2f5\">\n            <sc-for list=\"{{ filterChips }}\" as=\"ch\" hint-placeholder-count=\"6\">\n              <div onclick=\"{{ ch.onClick }}\" style=\"padding:6px 13px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid {{ ch.border }};background:{{ ch.bg }};color:{{ ch.color }}\">{{ ch.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"overflow-x:auto\">\n            <div style=\"min-width:760px\">\n              <div style=\"display:grid;grid-template-columns:54px 112px minmax(160px,1fr) 112px 150px 100px 150px;padding:0 8px;background:#fafbfc;border-bottom:1px solid #eef0f3\">\n                <div style=\"padding:10px 6px;font-size:10px;color:#8b8f9a;font-weight:700;letter-spacing:.5px;text-transform:uppercase\">#<\u002Fdiv>\n                <div style=\"padding:10px 6px;font-size:10px;color:#8b8f9a;font-weight:700;letter-spacing:.5px;text-transform:uppercase\">Trạng thái<\u002Fdiv>\n                <div style=\"padding:10px 6px;font-size:10px;color:#8b8f9a;font-weight:700;letter-spacing:.5px;text-transform:uppercase\">Task<\u002Fdiv>\n                <div style=\"padding:10px 6px;font-size:10px;color:#8b8f9a;font-weight:700;letter-spacing:.5px;text-transform:uppercase\">BU<\u002Fdiv>\n                <div style=\"padding:10px 6px;font-size:10px;color:#8b8f9a;font-weight:700;letter-spacing:.5px;text-transform:uppercase\">Function<\u002Fdiv>\n                <div style=\"padding:10px 6px;font-size:10px;color:#8b8f9a;font-weight:700;letter-spacing:.5px;text-transform:uppercase\">Ưu tiên<\u002Fdiv>\n                <div style=\"padding:10px 6px;font-size:10px;color:#8b8f9a;font-weight:700;letter-spacing:.5px;text-transform:uppercase\">Bắt đầu dự kiến<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ queueRows }}\" as=\"qr\" hint-placeholder-count=\"8\">\n                <div style=\"display:grid;grid-template-columns:54px 112px minmax(160px,1fr) 112px 150px 100px 150px;align-items:center;padding:0 8px;background:{{ qr.rowBg }};border-bottom:1px solid #f1f2f5\">\n                  <div style=\"padding:12px 6px;font-weight:800;color:{{ qr.orderColor }};font-size:14px\">{{ qr.order }}<\u002Fdiv>\n                  <div style=\"padding:12px 6px\"><span style=\"display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;background:{{ qr.statusBg }};color:{{ qr.statusColor }}\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ qr.statusColor }}\"><\u002Fspan>{{ qr.statusLabel }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"padding:12px 6px;font-weight:600\">{{ qr.title }}<sc-if value=\"{{ qr.isNew }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:7px;font-size:9.5px;font-weight:800;letter-spacing:.5px;color:#8a6516;background:#f7efe0;padding:2px 6px;border-radius:4px;vertical-align:middle\">MỚI<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                  <div style=\"padding:12px 6px;font-weight:600;color:#3b3f4a\">{{ qr.bu }}<\u002Fdiv>\n                  <div style=\"padding:12px 6px;color:#6b7080;font-weight:500\">{{ qr.func }}<\u002Fdiv>\n                  <div style=\"padding:12px 6px\"><span style=\"font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;background:{{ qr.prBg }};color:{{ qr.prColor }}\">{{ qr.prLabel }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"padding:12px 6px;font-weight:600;color:{{ qr.estColor }}\">{{ qr.estLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ emptyQueue }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:44px;text-align:center;color:#9aa0ac;font-size:13px\">Không có task nào trong phạm vi này.<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <!-- CONFIG MODAL -->\n  <sc-if value=\"{{ cfgOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeCfg }}\" style=\"position:fixed;inset:0;background:rgba(23,25,31,.5);display:flex;align-items:center;justify-content:center;z-index:90;padding:20px\">\n      <div onclick=\"{{ stop }}\" style=\"background:#fff;border-radius:14px;padding:26px 28px;width:520px;max-width:100%;box-shadow:0 24px 70px rgba(0,0,0,.3)\">\n        <div style=\"font-size:17px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px\">Kết nối Google Sheet<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#8c909c;margin-bottom:18px;line-height:1.55\">Dán URL <b>Apps Script Web App<\u002Fb> (đã Deploy · Anyone). Mỗi yêu cầu gửi đi sẽ được ghi thành 1 dòng trong Sheet.<\u002Fdiv>\n        <label class=\"bu-lab\">Apps Script Web App URL<\u002Flabel>\n        <input class=\"bu-in\" value=\"{{ sheetUrl }}\" oninput=\"{{ onSheetUrl }}\" placeholder=\"https://script.google.com/macros/s/…/exec\" autocomplete=\"off\">\n        <div style=\"font-size:11.5px;color:#9aa0ac;margin-top:9px;line-height:1.55\">Để trống = chế độ demo (lưu nội bộ, không gửi đi). Code Apps Script mẫu được cung cấp kèm theo.<\u002Fdiv>\n        <div style=\"display:flex;gap:10px;justify-content:flex-end;margin-top:22px\">\n          <button onclick=\"{{ closeCfg }}\" style=\"padding:11px 18px;background:#fff;color:#17191f;border:1px solid #dfe1e6;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit\">Đóng<\u002Fbutton>\n          <button onclick=\"{{ saveCfg }}\" style=\"padding:11px 18px;background:#17191f;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit\">Lưu kết nối<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  CREDIT = { X:0.5, S:1, M:3, L:8 };\n  FUNCS = [\n    { name:'Performance', cap:20, team:['Quân','Linh'] },\n    { name:'Content & Creative', cap:24, team:['Mai','Tú','Hà'] },\n    { name:'Marketing Operation', cap:16, team:['Nam','Phúc'] },\n    { name:'Marketing Strategy', cap:12, team:['Vy'] },\n    { name:'Growth & Innovation', cap:10, team:['Khoa'] },\n  ];\n  SHORT = { 'Performance':'Performance','Content & Creative':'Content','Marketing Operation':'Operation','Marketing Strategy':'Strategy','Growth & Innovation':'Growth' };\n  PR = {\n    P1:{ label:'Siêu gấp', c:'#9c4441', bg:'#f6e7e6' },\n    P2:{ label:'Gấp', c:'#8a6516', bg:'#f7efe0' },\n    P3:{ label:'Bình thường', c:'#345e8a', bg:'#e9eef5' },\n    P4:{ label:'Thấp', c:'#6b7080', bg:'#eef0f3' },\n  };\n  SEED = [\n    { title:'Tối ưu Google Ads Q3', bu:'Proship', func:'Performance', pr:'P2', cx:'L' },\n    { title:'Scale Facebook Ads', bu:'Ratraco', func:'Performance', pr:'P3', cx:'M' },\n    { title:'Test TikTok Ads sản phẩm mới', bu:'MICAFI', func:'Performance', pr:'P3', cx:'M' },\n    { title:'Retargeting giỏ hàng', bu:'Fado168', func:'Performance', pr:'P2', cx:'M' },\n    { title:'Audit tài khoản quảng cáo', bu:'EuroGo', func:'Performance', pr:'P3', cx:'M' },\n    { title:'Lead-gen campaign ra mắt', bu:'The Winds', func:'Performance', pr:'P2', cx:'L' },\n    { title:'Zalo Ads phủ thị trường', bu:'GoPrint', func:'Performance', pr:'P3', cx:'M' },\n    { title:'Google Ads gấp cho launch', bu:'FDS', func:'Performance', pr:'P1', cx:'M' },\n    { title:'Bộ ảnh sản phẩm mùa hè', bu:'Proship', func:'Content & Creative', pr:'P3', cx:'M' },\n    { title:'Video TVC thương hiệu', bu:'Ratraco', func:'Content & Creative', pr:'P2', cx:'L' },\n    { title:'Thiết kế landing page', bu:'MICAFI', func:'Content & Creative', pr:'P3', cx:'M' },\n    { title:'CRM automation flow', bu:'Fado VN', func:'Marketing Operation', pr:'P2', cx:'L' },\n    { title:'Email nurturing setup', bu:'EuroGo', func:'Marketing Operation', pr:'P3', cx:'M' },\n    { title:'Dashboard tracking & report', bu:'Internal Project', func:'Marketing Operation', pr:'P3', cx:'M' },\n    { title:'Tích hợp Zalo OA', bu:'Proship', func:'Marketing Operation', pr:'P3', cx:'M' },\n    { title:'Kế hoạch Marketing Q4', bu:'The Winds', func:'Marketing Strategy', pr:'P2', cx:'L' },\n    { title:'A/B test chiến lược giá', bu:'Fado168', func:'Growth & Innovation', pr:'P3', cx:'L' },\n    { title:'Referral program', bu:'GoPrint', func:'Growth & Innovation', pr:'P3', cx:'M' },\n  ];\n\n  state = {\n    tasks: [],\n    form: { title:'', bu:'', requester:'', func:'', pr:'P3', cx:'M', deadline:'', brief:'', desc:'', attachment:'', attachmentName:'' },\n    formErr:'', view:'submit', filterFunc:'all', showActive:true,\n    confirm:null, cfgOpen:false, sheetUrl:'',\n  };\n\n  componentDidMount() {\n    this._seq = this.SEED.length + 1;\n    this._ticket = 41;\n    try { const u = localStorage.getItem('bu_portal_sheet_url'); if (u) this.setState({ sheetUrl:u }); } catch(e){}\n    this.loadTasks();\n    this._poll = setInterval(()=>this.loadTasks(), 30000);\n  }\n  componentWillUnmount(){ if(this._poll) clearInterval(this._poll); }\n\n  // Đọc task thật từ Supabase (chung kho với trang Quản trị MKT) → đổi sang dạng của Cổng BU\n  mapFromMkt(mkt){\n    const CX={ 'XS - <1h':'X', 'S - <4h':'S', 'M - 1 day':'M', 'L - >2 days':'L' };\n    return (mkt||[])\n      .filter(t=>t && t.Status!=='Done' && t.Status!=='Cancelled')\n      .map((t,i)=>({ id:t._id||('m'+i), title:t['Request Name']||'(không tên)', bu:t.BU||'', func:t.Function||'', pr:t.Priority||'P3', cx:CX[t.Complexity]||'M', createdAt:(t.createdAt!=null?t.createdAt:(i+1)), confirmed:t.Confirmed!==false, isNew:false }));\n  }\n  async loadTasks(_tries){\n    const supa=this.getSupa();\n    if(!supa){ if((_tries||0)<8) setTimeout(()=>this.loadTasks((_tries||0)+1),500); return; }\n    try{\n      const {data,error}=await supa.from('app_state').select('data').eq('id','main').single();\n      if(error||!data) return;\n      const d=data.data||{};\n      this.setState({ tasks: this.mapFromMkt(d.tasks), loaded:true });\n    }catch(e){}\n  }\n\n  credit(t){ return this.CREDIT[t.cx] || 1; }\n  addBiz(days){ const d=new Date(); let a=0; while(a<days){ d.setDate(d.getDate()+1); const w=d.getDay(); if(w!==0&&w!==6)a++; } return d; }\n  fmtDate(d){ return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }\n  fmtShort(d){ return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'); }\n\n  computeFunc(name, tasks){\n    const cfg = this.FUNCS.find(f=>f.name===name) || { cap:16, team:[] };\n    const cap = cfg.cap;\n    const list = tasks.filter(t=>t.func===name);\n    const byArrival = list.slice().sort((a,b)=>a.createdAt-b.createdAt);\n    let cum=0; const active=[]; const overflow=[];\n    byArrival.forEach(t=>{ const cr=this.credit(t); if(cum+cr<=cap){active.push({t,cr});cum+=cr;} else overflow.push(t); });\n    const queue = overflow.sort((a,b)=>{\n      const ap=a.pr==='P1'?0:1, bp=b.pr==='P1'?0:1;\n      if(ap!==bp) return ap-bp;\n      if(ap===0) return b.createdAt-a.createdAt;\n      return a.createdAt-b.createdAt;\n    }).map(t=>({t,cr:this.credit(t)}));\n    const v = Math.max(cap/5,1); let ahead=0;\n    queue.forEach((q,i)=>{ ahead+=q.cr; q.pos=i+1; q.estDays=Math.max(1,Math.ceil(ahead/v)); q.estDate=this.addBiz(q.estDays); });\n    const demand = list.reduce((s,q)=>s+this.credit(q),0);\n    const util = cap?cum/cap:0;\n    let key='green'; if(queue.length>0)key='red'; else if(util>=0.8)key='amber';\n    return { name, cap, cum, demand, util, active, queue, status:key, members:cfg.team };\n  }\n  statusStyle(key){\n    if(key==='red') return { dot:'#c0504d', color:'#9c4441', bg:'#f6e7e6', label:'Overloaded', bar:'#b4524f' };\n    if(key==='amber') return { dot:'#c79a3a', color:'#8a6516', bg:'#f7efe0', label:'Busy', bar:'#b58a3a' };\n    return { dot:'#3f8a63', color:'#2f6d4d', bg:'#e6f0ea', label:'Available', bar:'#3f8a63' };\n  }\n  placementOf(id, name, tasks){\n    const res = this.computeFunc(name, tasks);\n    const a = res.active.find(x=>x.t.id===id);\n    if(a) return { mode:'active' };\n    const q = res.queue.find(x=>x.t.id===id);\n    if(q) return { mode:'queue', pos:q.pos, estDate:q.estDate, estDays:q.estDays };\n    return { mode:'active' };\n  }\n\n  async postSheet(payload){\n    const url=(this.state.sheetUrl||'').trim();\n    if(!url) return 'local';\n    try{ await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}); return 'ok'; }\n    catch(e){ return 'fail'; }\n  }\n\n  // ===== Ghi thẳng vào kho dữ liệu chung (Supabase) của trang Quản trị MKT =====\n  SUPA_URL='https://vxmuxorsnnharbrpygvw.supabase.co';\n  SUPA_KEY='sb_publishable__t-Jjuw0w2nxDK-WQKwXXQ_mEHOoIYl';\n  getSupa(){\n    if(this._supa) return this._supa;\n    try{ if(window.supabase&&window.supabase.createClient) this._supa=window.supabase.createClient(this.SUPA_URL,this.SUPA_KEY); }catch(e){}\n    return this._supa;\n  }\n  async pushSupabase(t){\n    const supa=this.getSupa();\n    if(!supa) return 'nolib';\n    const CXMAP={ X:'XS - <1h', S:'S - <4h', M:'M - 1 day', L:'L - >2 days' };\n    const now=new Date();\n    const iso=now.toISOString().slice(0,10);\n    const briefUrl=t.brief&&/^https?:\\/\\//i.test(t.brief.trim());\n    const isConsult=t.func==='__consult';\n    const notesParts=[];\n    if(isConsult) notesParts.push('⚠ CẦN TƯ VẤN (BU chưa rõ scope) — đợi MKT Services phản hồi.');\n    if(t.desc&&t.desc.trim()) notesParts.push(t.desc.trim());\n    if(t.brief&&t.brief.trim()) notesParts.push('Link brief: '+t.brief.trim());\n    if(t.attachmentName) notesParts.push('Ảnh đính kèm: '+t.attachmentName);\n    const task={\n      _id:'bu'+Date.now()+Math.random().toString(36).slice(2,6),\n      'Request ID':t.ticket,\n      'Request Date':iso,\n      BU:t.bu,\n      'Project/Campaign':'',\n      'Request Name':t.title,\n      Function:isConsult?'':t.func,\n      'Sub Function':'',\n      Requestor:(t.requester||'').trim()||'(Cổng BU)',\n      Source:'New Request',\n      Priority:t.pr,\n      Owner:'',\n      Status:'Open',\n      Confirmed:false,\n      'Start Date':'',\n      'Due Date':t.deadline||'',\n      'Close Date':'',\n      Complexity:isConsult?'':(CXMAP[t.cx]||''),\n      Notes:notesParts.join('\\n'),\n      Attachment:t.attachment?t.attachment:(briefUrl?t.brief.trim():''),\n      comments:[], history:[{at:now.toISOString(),txt:isConsult?'Tạo từ Cổng BU · Cần tư vấn':'Tạo từ Cổng yêu cầu BU'}], subtasks:[]\n    };\n    try{\n      const {data,error}=await supa.from('app_state').select('data').eq('id','main').single();\n      if(error||!data) return 'fail';\n      const d=data.data||{};\n      d.tasks=Array.isArray(d.tasks)?d.tasks:[];\n      d.tasks.push(task);\n      const {error:e2}=await supa.from('app_state').update({data:d,updated_at:now.toISOString()}).eq('id','main');\n      return e2?'fail':'ok';\n    }catch(e){ return 'fail'; }\n  }\n\n  renderVals(){\n    const tasks = this.state.tasks;\n    const confirmedTasks = tasks.filter(t=>t.confirmed!==false);\n    const pendingTasks = tasks.filter(t=>t.confirmed===false);\n    const computed = this.FUNCS.map(f=>this.computeFunc(f.name, confirmedTasks));\n    let totCap=0,totDemand=0,totActive=0,totQueue=0,maxWait=0;\n    computed.forEach(c=>{ totCap+=c.cap; totDemand+=c.demand; totActive+=c.active.length; totQueue+=c.queue.length; c.queue.forEach(q=>{ if(q.estDays>maxWait)maxWait=q.estDays; }); });\n    const anyQueue=totQueue>0; const ovUtil=totCap?totDemand/totCap:0;\n    let ovKey='green'; if(anyQueue)ovKey='red'; else if(ovUtil>=0.8)ovKey='amber';\n    const ovS=this.statusStyle(ovKey);\n    const ovText={ green:{label:'Đội đang có chỗ trống',sub:'Yêu cầu mới gửi vào sẽ được nhận làm ngay.'}, amber:{label:'Đội đang khá bận',sub:'Còn ít chỗ trống — yêu cầu mới có thể phải chờ một chút.'}, red:{label:'Đội đang kẹt',sub:'Yêu cầu mới sẽ vào hàng đợi — chỉ task siêu gấp (P1) được ưu tiên chèn lên đầu.'} }[ovKey];\n\n    const card = c=>{ const s=this.statusStyle(c.status); const pct=c.cap?Math.round(c.demand/c.cap*100):0; return {s,pct,pctCapped:Math.min(100,pct)}; };\n    const funcCards = computed.map(c=>{ const {s,pct,pctCapped}=card(c); return { name:c.name,dot:s.dot,statusLabel:s.label,statusColor:s.color,statusBg:s.bg,barColor:s.bar,pctCapped,pctLabel:pct+'%',activeCount:c.active.length,queueCount:c.queue.length,onClick:()=>this.setState({filterFunc:c.name,view:'queue'}) }; });\n    const detailRows = computed.map(c=>{ const {s,pct,pctCapped}=card(c); return { name:c.name,members:c.members.join(' · '),barColor:s.bar,pctCapped,pctLabel:pct+'%',demand:c.demand,cap:c.cap,queueCount:c.queue.length }; });\n\n    // prediction\n    const form=this.state.form; let pr;\n    if(!form.func){ pr={empty:true,has:false,isQueue:false,bg:'#fafbfc',border:'#eef0f3',color:'#6b7080',badge:'',msg:'',sub:'',pos:0,estLabel:''}; }\n    else if(form.func==='__consult'){ pr={empty:false,has:true,isQueue:false,bg:'#e9eef5',border:'#cdddee',color:'#345e8a',badge:'CẦN TƯ VẤN',msg:'Chờ MKT Services phản hồi',sub:'Yêu cầu sẽ được MKT Services xem xét & tư vấn (chọn Function phù hợp, quy mô, hướng xử lý) rồi mới xếp vào hàng đợi.',pos:0,estLabel:''}; }\n    else {\n      const hyp={id:'__hyp',func:form.func,pr:form.pr,cx:form.cx,createdAt:999999};\n      const p=this.placementOf('__hyp',form.func,[...confirmedTasks,hyp]); const short=this.SHORT[form.func]||form.func;\n      if(p.mode==='active'){ pr={empty:false,has:true,isQueue:false,bg:'#eef6f0',border:'#cfe5d8',color:'#2f6d4d',badge:'VÀO LÀM NGAY',msg:'Task vào làm ngay ✓',sub:short+' đang còn chỗ trống nên yêu cầu được nhận và bắt đầu hôm nay.',pos:0,estLabel:''}; }\n      else { const jump=form.pr==='P1'; pr={empty:false,has:true,isQueue:true,bg:'#fbf4ea',border:'#ecddc2',color:'#8a6516',badge:jump?'CHÈN ĐẦU HÀNG ĐỢI (P1)':'VÀO HÀNG ĐỢI',msg:'Xếp hàng đợi · vị trí #'+p.pos,sub:jump?short+' đang kẹt. Task P1 siêu gấp được chèn lên đầu hàng đợi.':short+' đang kẹt nên task vào hàng đợi. Muốn ưu tiên hơn, chọn P1 siêu gấp.',pos:p.pos,estLabel:this.fmtShort(p.estDate)+' (~'+p.estDays+' ngày)'}; }\n    }\n\n    // queue rows\n    const waiting=[],activeRows=[];\n    computed.forEach(c=>{ c.queue.forEach(q=>waiting.push({c,q})); c.active.forEach(a=>activeRows.push({c,a})); });\n    waiting.sort((x,y)=>x.q.estDays-y.q.estDays||x.q.t.createdAt-y.q.t.createdAt);\n    const ff=this.state.filterFunc; const matchF=n=>ff==='all'||ff===n; const rows=[];\n    const MASK='Yêu cầu (ẩn chi tiết · bảo mật dự án)';\n    pendingTasks.forEach(t=>{ if(ff!=='all'&&ff!==t.func)return; const prc=this.PR[t.pr]||this.PR.P3; rows.push({ key:t.id,order:'•',orderColor:'#8c909c',rowBg:'#fafbfc',statusLabel:'Chờ xác nhận',statusColor:'#6b7080',statusBg:'#eef0f3',title:MASK,bu:t.bu,func:t.func||'—',prLabel:t.pr+' · '+prc.label,prColor:prc.c,prBg:prc.bg,estLabel:'Chờ MKT xác nhận',estColor:'#8c909c',isNew:!!t.isNew }); });\n    waiting.forEach((w,i)=>{ if(!matchF(w.c.name))return; const prc=this.PR[w.q.t.pr]||this.PR.P3; rows.push({ key:w.q.t.id,order:String(i+1),orderColor:'#b58a3a',rowBg:w.q.t.isNew?'#fffaf0':'#fff',statusLabel:'Chờ',statusColor:'#8a6516',statusBg:'#f7efe0',title:MASK,bu:w.q.t.bu,func:w.c.name,prLabel:w.q.t.pr+' · '+prc.label,prColor:prc.c,prBg:prc.bg,estLabel:this.fmtShort(w.q.estDate)+' (~'+w.q.estDays+' ngày)',estColor:'#8a6516',isNew:!!w.q.t.isNew }); });\n    if(this.state.showActive){ activeRows.forEach(r=>{ if(!matchF(r.c.name))return; const prc=this.PR[r.a.t.pr]||this.PR.P3; rows.push({ key:r.a.t.id,order:'▶',orderColor:'#3f8a63',rowBg:r.a.t.isNew?'#fffaf0':'#fff',statusLabel:'Đang làm',statusColor:'#2f6d4d',statusBg:'#e6f0ea',title:MASK,bu:r.a.t.bu,func:r.c.name,prLabel:r.a.t.pr+' · '+prc.label,prColor:prc.c,prBg:prc.bg,estLabel:'Đang làm',estColor:'#2f6d4d',isNew:!!r.a.t.isNew }); }); }\n    const filterChips=[{key:'all',label:'Tất cả'},...this.FUNCS.map(f=>({key:f.name,label:this.SHORT[f.name]}))].map(ch=>{ const on=ff===ch.key; return { key:ch.key,label:ch.label,onClick:()=>this.setState({filterFunc:ch.key}),bg:on?'#17191f':'#fff',color:on?'#fff':'#3b3f4a',border:on?'#17191f':'#e6e7ec' }; });\n\n    // nav\n    const v=this.state.view;\n    const navDef=[{key:'submit',icon:'✎',label:'Gửi yêu cầu'},{key:'capacity',icon:'⚖',label:'Workload'},{key:'queue',icon:'▦',label:'Hàng đợi chung'}];\n    const nav=navDef.map(n=>{ const on=v===n.key; return { key:n.key,icon:n.icon,label:n.label,onClick:()=>this.setState({view:n.key}),weight:on?'600':'500',color:on?'#fff':'#b7bac4',bg:on?'rgba(255,255,255,.09)':'transparent',border:on?'#fff':'transparent',hasBadge:n.key==='queue'&&totQueue>0,badge:String(totQueue) }; });\n    const titles={submit:['Gửi yêu cầu','Đặt yêu cầu cho đội Marketing — hệ thống tự xếp việc theo năng lực'],capacity:['Team Workload','Current load by function & owner'],queue:['Hàng đợi chung','Toàn bộ task đang làm và chờ xử lý']};\n\n    // confirmation\n    const conf=this.state.confirm; let cf=null;\n    if(conf){\n      const isConsult=conf.mode==='consult';\n      const isQ=conf.mode==='queue';\n      const sheetMap={ sending:{label:'Đang gửi sang trang Quản trị MKT…',color:'#6b7080',bg:'#f4f5f7',icon:'⟳'}, ok:{label:'Đã gửi vào mục “Yêu cầu mới” của Quản trị MKT',color:'#2f6d4d',bg:'#e6f0ea',icon:'✓'}, fail:{label:'Chưa gửi được — kiểm tra mạng rồi gửi lại',color:'#8a6516',bg:'#f7efe0',icon:'⚠'}, nolib:{label:'Chưa kết nối được kho dữ liệu — thử tải lại trang',color:'#8a6516',bg:'#f7efe0',icon:'⚠'}, local:{label:'Đã lưu nội bộ',color:'#6b7080',bg:'#f4f5f7',icon
