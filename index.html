
<!DOCTYPE html>
<html lang="vi">

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17191f;--ink2:#3b3f4a;--muted:#8c909c;
    --navy:#17191f;--navy2:#1d2027;--navy3:#2b2f38;
    --gold:#17191f;
    --bg:#f4f5f7;--card:#ffffff;--line:#e6e7ec;
    --green:#3f8a63;--blue:#3b6ea5;--purple:#6b5e9c;--red:#b4524f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  input,select,textarea,button,option{font-family:'Be Vietnam Pro',system-ui,-apple-system,sans-serif}
  input::placeholder,textarea::placeholder{font-family:inherit}
  input[type=date]::-webkit-datetime-edit,input[type=date]::-webkit-datetime-edit-fields-wrapper,input[type=date]::-webkit-datetime-edit-text,input[type=date]::-webkit-datetime-edit-month-field,input[type=date]::-webkit-datetime-edit-day-field,input[type=date]::-webkit-datetime-edit-year-field{font-family:'Be Vietnam Pro',system-ui,sans-serif}

  /* LOGIN */
  #login{position:fixed;inset:0;background:#17191f;display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .lbox{background:#fff;border-radius:14px;padding:40px 36px;width:380px;box-shadow:0 24px 70px rgba(0,0,0,.4)}
  .lbox .logo{width:52px;height:52px;border-radius:12px;background:#17191f;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:19px;margin:0 auto 18px;letter-spacing:.5px}
  .lbox h2{text-align:center;font-size:20px;font-weight:700;margin-bottom:5px;letter-spacing:-.3px}
  .lbox .s{text-align:center;color:var(--muted);font-size:13px;margin-bottom:26px}
  .lbox label{font-size:12.5px;font-weight:600;color:var(--ink2);display:block;margin-bottom:6px;margin-top:15px}
  .lbox input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:9px;font-size:14px;outline:none;font-family:inherit;transition:.15s}
  .lbox input:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(23,25,31,.08)}
  .lbox button{width:100%;margin-top:24px;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
  .lbox button:hover{background:#000}

  .hint{margin-top:20px;padding:13px;background:#f6f7f9;border:1px solid var(--line);border-radius:9px;font-size:12px;color:var(--muted);line-height:1.7}
  /* APP */
  #app{display:none;min-height:100vh}
  .wrap{display:flex;min-height:100vh}
  .sidebar{width:240px;background:#17191f;color:#c8cad2;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
  .brand{display:flex;align-items:center;gap:12px;padding:22px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
  .brand .logo{width:38px;height:38px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;color:#17191f;font-size:14px;letter-spacing:.5px}
  .brand b{color:#fff;font-size:14px;display:block;line-height:1.2;letter-spacing:-.2px}
  .brand span{font-size:10px;color:#7f8493;letter-spacing:1.5px;font-weight:600}
  .menu{padding:16px 12px;flex:1;overflow-y:auto}
  .menu .lbl{font-size:10px;color:#6b7080;letter-spacing:1.8px;padding:14px 12px 8px;font-weight:700}
  .menu a{display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:8px;color:#b7bac4;text-decoration:none;font-size:13.5px;font-weight:500;margin-bottom:2px;cursor:pointer;transition:.12s;border-left:2px solid transparent}

  .side-foot{padding:15px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:11px}
  .side-foot .av{width:34px;height:34px;border-radius:8px;background:#2b2f38;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}

  .main{flex:1;padding:28px 32px;max-width:calc(100vw - 240px)}

  .top h1{font-size:22px;font-weight:700;letter-spacing:-.4px}.top .sub{font-size:13px;color:var(--muted);margin-top:3px}

  .panel{background:#fff;border:1px solid var(--line);border-radius:12px;padding:19px 21px}
  .panel h3{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:9px;letter-spacing:-.2px}

  .gfbar{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin:2px 0 20px;flex-wrap:wrap}

  thead th:hover{color:var(--ink)}

  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fafbfc}
  .name-cell{font-weight:600;max-width:340px}
  .rid{font-size:11.5px;color:var(--muted);font-family:ui-monospace,'SFMono-Regular',monospace}
  .pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap}
  .st-Open{background:#f7efe0;color:#956511}.st-WIP{background:#e9eef5;color:#345e8a}
  .st-Done{background:#e6f0ea;color:#2f6d4d}.st-Waiting{background:#edeaf3;color:#574a82}.st-Cancelled{background:#f0f1f3;color:#787d8c}
  .pr{font-weight:700;font-size:11px;padding:2px 8px;border-radius:5px}
  .pr-P1{background:#f6e7e6;color:#9c4441}.pr-P2{background:#f7efe0;color:#956511}
  .pr-P3{background:#e9eef5;color:#345e8a}.pr-P4{background:#eef0f3;color:#6b7080}
  .bu-tag{font-size:12px;color:var(--ink2);font-weight:600}
  .empty{padding:50px;text-align:center;color:var(--muted)}.empty .big{font-size:38px;margin-bottom:12px;opacity:.5}
  .acts{display:flex;gap:6px}
  .ico{cursor:pointer;color:var(--muted);font-size:14px;padding:4px;border-radius:5px}
  .ico:hover{color:var(--ink);background:#f1f2f5}
  /* MODAL */
  .modal{position:fixed;inset:0;background:rgba(23,25,31,.55);display:none;align-items:flex-start;justify-content:center;z-index:90;padding:44px 16px;overflow-y:auto}
  .modal.show{display:flex}
  .mbox{background:#fff;border-radius:14px;padding:26px 28px;width:560px;max-width:100%;box-shadow:0 24px 70px rgba(0,0,0,.25)}
  .mbox h2{font-size:18px;font-weight:700;margin-bottom:20px;letter-spacing:-.3px}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .fld{margin-bottom:0}
  .fld label{font-size:12px;font-weight:600;color:var(--ink2);display:block;margin-bottom:6px}
  .fld input,.fld select,.fld textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;outline:none;font-family:inherit}
  .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--ink)}
  .fld.full{grid-column:1/3}
  .mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
  .role-badge{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700}
  .role-admin{background:#f6e7e6;color:#9c4441}.role-ceo{background:#f7efe0;color:#956511}
  .role-head{background:#e9eef5;color:#345e8a}.role-lead{background:#e9eef5;color:#345e8a}.role-staff{background:#e6f0ea;color:#2f6d4d}
  .role-manager{background:#edeaf3;color:#574a82}
  input[type=file]{display:none}
  .hidden{display:none!important}
  @media(max-width:980px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.mgrid{grid-template-columns:1fr}.fld.full{grid-column:1}.sidebar{width:64px}.brand b,.brand span,.menu a span,.menu .lbl,.side-foot b,.side-foot span{display:none}.main{max-width:calc(100vw - 64px);padding:18px}}
</style>
</head>

        <div class="out" id="logoutBtn" title="Đăng xuất" style="margin-left:11px;display:flex;align-items:center"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>

<script>
/* ============ STORAGE ============ */
const DB_KEY='fado_mkt_crm_v1';
const SESS_KEY='fado_mkt_session';
/* ===== SUPABASE (dữ liệu dùng chung cả team) =====
   Dán anon key của bạn vào dòng SUPA_KEY bên dưới (Supabase → Settings → API Keys → anon public). */
const SUPA_URL='https://vxmuxorsnnharbrpygvw.supabase.co';
const SUPA_KEY='sb_publishable__t-Jjuw0w2nxDK-WQKwXXQ_mEHOoIYl';
let supa=null,REMOTE_OK=false;
try{ if(window.supabase&&SUPA_KEY&&SUPA_KEY.indexOf('PASTE')<0) supa=window.supabase.createClient(SUPA_URL,SUPA_KEY); }catch(e){console.warn('Supabase init',e);}
let DB={users:[],depts:[],staff:[],tasks:[],session:null,gsheet:{csvUrl:'',map:{}}};
const CATS={
  BU:['Proship','Ratraco','MICAFI','FDS','Fado168','EuroGo','Fado VN','The Winds','GoPrint','Internal Project','BOD/CEO'],
  Function:['Demand Management','Marketing Strategy','Performance','Marketing Operation','Content & Creative','Growth & Innovation'],
  SubFunction:['Request Intake','Project Coordination','Campaign Planning','Research','KPI','Google Ads','Facebook Ads','TikTok Ads','Zalo Ads','SEO','Lead Generation','Retargeting','Website','Landing Page','Tracking','Dashboard','Analytics','Reporting','Content'],
  Source:['New Request','Recurring','Maintenance','Campaign','Ad-hoc/Internal'],
  Priority:['P1','P2','P3','P4'],
  Status:['Open','WIP','Waiting','Done','Cancelled'],
  Frequency:['Regular','Occasional'],
  Complexity:['XS - <1h','S - <4h','M - 1 day','L - >2 days'],
  QC:['—','Pass','Fail'],
  Health:['On track','Difficulty','Blocked'],
  TaskType:['Một lần','Định kỳ'],
  Cadence:['Hàng ngày','Hàng tuần','Hàng tháng'],
};
const ROLES={admin:'Administrator',manager:'Marketing Work Mgmt',lead:'Function Lead',staff:'Staff'};
// Backward-compat labels for any old accounts still tagged ceo/head
const ROLES_LEGACY={ceo:'Marketing Work Mgmt',head:'Function Lead'};
function roleLabel(r){return ROLES[r]||ROLES_LEGACY[r]||r;}
function migrateRoles(){let ch=false;(DB.users||[]).forEach(u=>{if(u.role==='head'){u.role='lead';if(!u.func&&u.bu){u.func='';}ch=true;}else if(u.role==='ceo'){u.role='manager';ch=true;}});return ch;}
// Credit scale by Complexity (adjust here if needed)
const CREDIT_MAP={'X':0.5,'S':1,'M':3,'L':8};
function creditOf(t){
  if(t.CreditOverride!=null&&t.CreditOverride!==''){const n=Number(t.CreditOverride);if(!isNaN(n))return n;}
  const cx=(t.Complexity||'').trim().charAt(0).toUpperCase();
  return CREDIT_MAP[cx]||1; // default 1 when complexity is unknown
}
function sumCredit(arr){return arr.reduce((s,t)=>s+creditOf(t),0);}

/* ---- progress / deadline / quality helpers ---- */
function today(){return new Date().toISOString().slice(0,10);}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function isClosed(t){return t.Status==='Done'||t.Status==='Cancelled';}
function dueState(t){
  if(isClosed(t)||!t['Due Date'])return 'none';
  const n=daysToDue(t);
  if(n==null)return 'none';
  if(n<0)return 'overdue';
  if(n<=3)return 'soon'; // gồm cả hôm nay (0) và 3 ngày tới
  return 'ok';
}
function dnum(s){const d=parseDate(s);return d?d.getTime():null;}
function onOrBefore(a,b){const x=dnum(a),y=dnum(b);if(x==null||y==null)return (a||'')<=(b||'');return x<=y;}
function progressOf(t){
  if(t.Status==='Done')return 100;
  if(t.Status==='Cancelled')return 0;
  const sp=subProgress(t);if(sp)return Math.round(sp.done/sp.total*100);
  const p=Number(t.Progress);return isNaN(p)?0:Math.max(0,Math.min(100,p));
}
function subProgress(t){const s=(t&&t.subtasks)||[];if(!s.length)return null;return{done:s.filter(x=>x.status==='Done').length,total:s.length};}
function onTimeRate(arr){
  const done=arr.filter(t=>t.Status==='Done'&&t['Due Date']);
  if(!done.length)return null;
  const ok=done.filter(t=>onOrBefore(t['Close Date']||today(),t['Due Date'])).length;
  return Math.round(ok/done.length*100);
}
function overdueList(arr){return arr.filter(t=>dueState(t)==='overdue');}
function daysToDue(t){if(!t['Due Date'])return null;const d=parseDate(t['Due Date']);if(!d)return null;const t0=new Date();t0.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.round((d-t0)/86400000);}
function dueBadge(t){
  const s=dueState(t);if(s==='none')return '';
  const n=daysToDue(t);
  const wrap=(bg,fg,txt,tip)=>`<span title="${tip||''}" style="display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;background:${bg};color:${fg};white-space:nowrap">${txt}</span>`;
  if(s==='overdue')return wrap('#f6e7e6','#9c4441','⏰ QUÁ HẠN '+(n==null?'':Math.abs(n)+'N'),'Đã quá hạn '+(n==null?'':Math.abs(n)+' ngày'));
  if(s==='soon'){const txt=n===0?'HẾT HẠN HÔM NAY':'CÒN '+n+'N';return wrap('#f7efe0','#956511',txt,'Còn '+n+' ngày đến hạn');}
  if(s==='ok')return wrap('#eef1f7','#5b6478','còn '+n+'N','Còn '+n+' ngày đến hạn');
  return '';
}
function logHist(t,text){t.Updated=new Date().toISOString();(t.history=t.history||[]).push({by:me().name,at:new Date().toLocaleString('en-GB'),text});}
/* ---- "lần cập nhật cuối" & cờ stale (chưa cập nhật lâu) ---- */
const STALE_DAYS=4; // task đang mở mà không cập nhật quá ngần này ngày -> stale
function parseGB(s){const m=String(s||'').match(/(\d{2})\/(\d{2})\/(\d{4})/);return m?new Date(+m[3],+m[2]-1,+m[1]):null;}
function parseDate(s){s=String(s||'').trim();if(!s)return null;let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return new Date(+m[3],+m[2]-1,+m[1]);const d=new Date(s);return isNaN(d)?null:d;}
function lastUpdate(t){
  if(t.Updated){const d=new Date(t.Updated);if(!isNaN(d))return d;}
  const h=(t.history||[]).filter(x=>x.at&&x.at!=='(mẫu)');
  if(h.length){const d=parseGB(h[h.length-1].at);if(d)return d;}
  const rd=t['Request Date'];if(rd){const d=parseDate(rd);if(d)return d;}
  return null;
}
function daysSinceUpdate(t){const d=lastUpdate(t);if(!d)return null;return Math.floor((Date.now()-d.getTime())/86400000);}
function isStale(t){if(isClosed(t)||isRecurring(t))return false;const n=daysSinceUpdate(t);return n!=null&&n>=STALE_DAYS;}
function staleBadge(t){if(!isStale(t))return '';const n=daysSinceUpdate(t);return `<span title="Chưa cập nhật ${n} ngày" style="display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;background:#ece7f3;color:#6b5e9c">⏳ ${n}N CHƯA UPDATE</span>`;}
function progBar(p){return `<div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:7px;background:#eef0f3;border-radius:5px;overflow:hidden;min-width:50px"><div style="height:100%;width:${p}%;background:${p>=100?'var(--green)':'var(--ink)'};border-radius:5px;transition:width .4s"></div></div><span style="font-size:11px;font-weight:700;color:var(--ink2);width:32px;text-align:right">${p}%</span></div>`;}

/* ---- recurring / period helpers ---- */
function fmtLocal(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isoWeek(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-day);const ys=new Date(Date.UTC(dt.getUTCFullYear(),0,1));const wk=Math.ceil((((dt-ys)/86400000)+1)/7);return dt.getUTCFullYear()+'-W'+String(wk).padStart(2,'0');}
function periodKey(cad,dateStr){const d=dateStr?new Date(dateStr):new Date();if(cad==='Hàng ngày')return fmtLocal(d);if(cad==='Hàng tuần')return isoWeek(d);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function periodLabel(cad,key){if(!key)return '';if(cad==='Hàng ngày'){const p=key.split('-');return p[2]+'/'+p[1];}if(cad==='Hàng tuần'){return 'Tuần '+(key.split('-W')[1]||'');}const p=key.split('-');return 'T'+Number(p[1])+'/'+p[0];}
function recentPeriods(cad,n){const out=[],d=new Date();for(let i=0;i<n;i++){const x=new Date(d);if(cad==='Hàng ngày')x.setDate(d.getDate()-i);else if(cad==='Hàng tuần')x.setDate(d.getDate()-i*7);else x.setMonth(d.getMonth()-i);out.push(periodKey(cad,fmtLocal(x)));}return out.reverse();}
function periodDate(cad,key){if(!key)return '';if(cad==='Hàng ngày')return key;if(cad==='Hàng tuần'){const p=key.split('-W');const y=+p[0],w=+p[1];const simple=new Date(Date.UTC(y,0,1+(w-1)*7));const dow=simple.getUTCDay();const mon=new Date(simple);mon.setUTCDate(simple.getUTCDate()+((dow<=4?1:8)-dow));return fmtLocal(mon);}return key+'-15';}
function isRecurring(t){return t.Type==='Định kỳ';}
function quotaOf(t){const q=Number(t.Quota);return !q||q<0?0:q;}
function periodCount(t,key){const r=(t.periods||{})[key];return r?Number(r.count||0):0;}
function recStatus(t){const cad=t.Cadence||'Hàng tháng';const key=periodKey(cad);const done=periodCount(t,key);const q=quotaOf(t);if(q)return{cad,key,done,q,pct:Math.min(100,Math.round(done/q*100)),ok:done>=q};return{cad,key,done,q:0,pct:done>=1?100:0,ok:done>=1};}
function recMissedPrev(t){const cad=t.Cadence||'Hàng tháng';const ks=recentPeriods(cad,2);if(ks.length<2)return false;const cnt=periodCount(t,ks[0]);const q=quotaOf(t);return q?cnt<q:cnt<1;}
window.recSet=(id,key,count,note)=>{const t=DB.tasks.find(x=>x._id===id);if(!t)return;t.periods=t.periods||{};const r=t.periods[key]||{};const nc=Math.max(0,count);t.periods[key]={count:nc,note:note!=null?note:(r.note||''),by:me().name,at:new Date().toLocaleString('en-GB')};logHist(t,'Kỳ '+periodLabel(t.Cadence||'Hàng tháng',key)+': '+nc+(quotaOf(t)?'/'+quotaOf(t):' (đã làm)'));save();render();};

function remoteShape(){return {users:DB.users,depts:DB.depts,staff:DB.staff,tasks:DB.tasks,gsheet:DB.gsheet};}
let _saveTimer=null,REMOTE_TS=null,SAVE_PENDING=false,_pushing=false,_dirty=false;
function save(){
  try{localStorage.setItem(SESS_KEY,DB.session||'');}catch(e){}
  try{localStorage.setItem(DB_KEY,JSON.stringify(DB));}catch(e){}   /* backup cục bộ */
  if(supa){SAVE_PENDING=true;pushRemote();}   /* ghi NGAY lên cloud, không chờ — tránh mất lệnh khi tải lại nhanh */
}
async function pushRemote(){
  if(!supa)return;
  if(_pushing){_dirty=true;return;}            /* gộp các lần ghi liên tiếp */
  _pushing=true;
  const ts=new Date().toISOString();
  try{
    const {error}=await supa.from('app_state').update({data:remoteShape(),updated_at:ts}).eq('id','main');
    setSync(!error);if(error)console.warn('Supabase save:',error.message);else REMOTE_TS=ts; // đánh dấu bản của mình để live-sync không tự kéo lại
  }catch(e){setSync(false);console.warn(e);}
  _pushing=false;SAVE_PENDING=false;
  if(_dirty){_dirty=false;pushRemote();}        /* có thay đổi trong lúc đang ghi -> ghi lại */
}
/* Live-sync: tự lấy bản mới từ Supabase khi người khác cập nhật (không cần F5) */
async function liveSync(){
  if(!supa||SAVE_PENDING)return;
  const modal=document.getElementById('modal');
  if(modal&&modal.classList.contains('show'))return; // đang mở popup chỉnh sửa -> hoãn
  const ae=document.activeElement;
  if(ae&&/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName))return; // đang gõ/chọn -> hoãn
  try{
    const {data,error}=await supa.from('app_state').select('data,updated_at').eq('id','main').single();
    if(error||!data)return;
    if(REMOTE_TS&&data.updated_at===REMOTE_TS)return; // không có gì mới
    REMOTE_TS=data.updated_at;
    const d=data.data||{};
    DB.users=d.users||[];DB.depts=d.depts||[];DB.staff=d.staff||[];DB.tasks=d.tasks||[];if(d.gsheet)DB.gsheet=d.gsheet;
    setSync(true);buildMenu();render();
  }catch(e){}
}
let LIVE_TIMER=null;
function startLiveSync(){if(LIVE_TIMER)clearInterval(LIVE_TIMER);if(supa)LIVE_TIMER=setInterval(liveSync,30000);} // mỗi 30 giây
function loadLocal(){try{const d=localStorage.getItem(DB_KEY);if(d)Object.assign(DB,JSON.parse(d));}catch(e){}}
async function load(){
  let ok=true;
  if(supa){
    try{
      const {data,error}=await supa.from('app_state').select('data,updated_at').eq('id','main').single();
      if(error)throw error;
      const d=(data&&data.data)||{};
      REMOTE_TS=data&&data.updated_at||null;
      DB.users=d.users||[];DB.depts=d.depts||[];DB.staff=d.staff||[];DB.tasks=d.tasks||[];DB.gsheet=d.gsheet||{csvUrl:'',map:{}};
      REMOTE_OK=true;setSync(true);
    }catch(e){ok=false;REMOTE_OK=false;setSync(false);console.warn('Supabase load failed:',e&&e.message);}
  }else{loadLocal();setSync(false);}
  try{const s=localStorage.getItem(SESS_KEY);if(s)DB.session=s;}catch(e){}   /* phiên đăng nhập: riêng từng máy */
  return ok;
}

/* ============ ROLE-BASED TASK SCOPE ============ */
function roleTasks(){
  const u=me();
  if(u.role==='admin'||u.role==='manager')return DB.tasks;
  if(u.role==='lead')return DB.tasks.filter(t=>t.Function===u.func||t.Owner===u.name||(t.subtasks||[]).some(s=>s.owner===u.name)); // lead: their function + anything assigned to them
  return DB.tasks.filter(t=>t.Owner===u.name||(t.subtasks||[]).some(s=>s.owner===u.name)); // staff: own tasks + sub-items assigned
}
// Quyền SỬA task (chặt hơn quyền XEM): admin/manager sửa tất cả · lead chỉ sửa task trong function mình hoặc của mình · nhân viên chỉ task của mình
function canEditTask(t){
  const u=me();
  if(['admin','manager'].includes(u.role))return true;
  if(u.role==='lead')return t.Function===u.func||t.Owner===u.name||(t.subtasks||[]).some(s=>s.owner===u.name);
  return t.Owner===u.name||(t.subtasks||[]).some(s=>s.owner===u.name);
}

function healthPill(h){if(!h)return '';const c=HEALTH[h]||'#9aa0ac',bg=HEALTHBG[h]||'#f0f1f3';return `<span style="display:inline-block;padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:700;background:${bg};color:${c}">${h==='On track'?'ON TRACK':h.toUpperCase()}</span>`;}

function gc(arr,f){const m={};arr.forEach(t=>{const k=t[f]||'(empty)';m[k]=(m[k]||0)+1;});return m;}
function bars(m,cf){const tot=Object.values(m).reduce((a,b)=>a+b,0)||1;return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([k,v],i)=>`<div class="row"><div class="name">${esc(k)}</div><div class="track"><div class="fill" style="width:${v/tot*100}%;background:${cf(k,i)}"></div></div><div class="val">${v}</div></div>`).join('')||'<div style="color:var(--muted);font-size:12.5px">No data yet</div>';}

const DATE_FIELDS=[['Due Date','Hết hạn'],['Request Date','Ngày tạo'],['Close Date','Hoàn thành']];
function dRange(p){
  const d=new Date(),y=d.getFullYear(),m=d.getMonth();
  const fmt=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  if(p==='today')return [fmt(d),fmt(d)];
  if(p==='yesterday'){const a=new Date(d);a.setDate(d.getDate()-1);return [fmt(a),fmt(a)];}
  if(p==='week'){const dow=(d.getDay()+6)%7,s=new Date(d);s.setDate(d.getDate()-dow);const e=new Date(s);e.setDate(s.getDate()+6);return [fmt(s),fmt(e)];}
  if(p==='last7'){const s=new Date(d);s.setDate(d.getDate()-6);return [fmt(s),fmt(d)];}
  if(p==='month'){return [fmt(new Date(y,m,1)),fmt(new Date(y,m+1,0))];}
  if(p==='lastmonth'){return [fmt(new Date(y,m-1,1)),fmt(new Date(y,m,0))];}
  if(p==='quarter'){const q=Math.floor(m/3);return [fmt(new Date(y,q*3,1)),fmt(new Date(y,q*3+3,0))];}
  if(p==='year'){return [y+'-01-01',y+'-12-31'];}
  return ['',''];
}

function delSelected(canEdit){

  if(!confirm('Xóa '+ids.length+' task đã chọn? Hành động này không thể hoàn tác.'))return;
  const set=new Set(ids);
  DB.tasks=DB.tasks.filter(t=>!set.has(t._id));

function filterT(){
  let r=visibleTasks().filter(t=>{
    if(F.status&&t.Status!==F.status)return false;
    if(F.bu&&t.BU!==F.bu)return false;
    if(F.pr&&t.Priority!==F.pr)return false;
    if(F.owner&&t.Owner!==F.owner)return false;
    if(F.health&&t.Health!==F.health)return false;
    if(F.asn==='unassigned'&&t.Owner)return false;
    if(F.type&&(t.Type||'Một lần')!==F.type)return false;
    if(F.cx&&(t.Complexity||'').trim().charAt(0).toUpperCase()!==F.cx.trim().charAt(0).toUpperCase())return false;
    if(F.q){const q=F.q.toLowerCase();if(!((t['Request Name']+' '+t['Request ID']+' '+t['Project/Campaign']+' '+t.BU)||'').toLowerCase().includes(q))return false;}
    return true;
  });
  r.sort((a,b)=>((a[SORT.k]||'')+'').localeCompare((b[SORT.k]||'')+'','vi',{numeric:true})*SORT.d);
  return r;
}

/* ---- EXPORT TASKS -> EXCEL ---- */
function exportTasks(){
  const rows=filterT();
  if(!rows.length){alert('Không có task nào để xuất (đang lọc rỗng).');return;}
  exportTaskRows(rows,'FADO_MKT_Tasks_'+today()+'.xlsx');
}
function exportTaskRows(rows,filename,sheet){
  if(typeof XLSX==='undefined'){alert('Không tải được thư viện Excel. Kiểm tra kết nối mạng rồi thử lại.');return;}
  if(!rows||!rows.length){alert('Không có dữ liệu để xuất.');return;}
  const cols=['Request ID','Request Date','BU','Project/Campaign','Request Name','Function','Sub Function','Requestor','Source','Priority','Owner','Status','Start Date','Due Date','Close Date','Frequency','Complexity'];
  const data=rows.map(t=>{
    const o={};
    cols.forEach(k=>o[k]=t[k]!=null?t[k]:'');
    o['Credit']=creditOf(t);
    o['Progress %']=progressOf(t);
    o['Còn/Quá hạn (ngày)']=(()=>{const n=daysToDue(t);return n==null?'':n;})();
    o['Health']=t.Health||'';
    o['Blocker']=t.Blocker||'';
    o['QC']=t.QC||'';
    o['Revisions']=t.Revisions!=null?t.Revisions:'';
    o['Satisfaction']=t.Satisfaction!=null?t.Satisfaction:'';
    o['Loại']=t.Type||'Một lần';
    o['Chu kỳ']=isRecurring(t)?(t.Cadence||''):'';
    o['Chỉ tiêu/kỳ']=isRecurring(t)?(quotaOf(t)||''):'';
    o['Kỳ này đã làm']=isRecurring(t)?recStatus(t).done:'';
    o['Cancel Reason']=t['Cancel Reason']||'';
    o['Notes']=t.Notes||'';
    return o;
  });
  const ws=XLSX.utils.json_to_sheet(data);
  ws['!cols']=Object.keys(data[0]).map(h=>({wch:h==='Request Name'||h==='Notes'||h==='Project/Campaign'?34:(h==='Blocker'?28:14)}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,sheet||'Tasks');
  XLSX.writeFile(wb,filename||('FADO_MKT_'+today()+'.xlsx'));
}

window.saveTask=id=>{
  const g=x=>{const e=document.getElementById(x);return e?e.value.trim():'';};
  if(!g('t_name')){alert('Hãy nhập tên công việc');return;}
  if(!g('t_own')){alert('Hãy chọn người nhận việc (Lead hoặc nhân viên)');return;}
  const prev=id?DB.tasks.find(t=>t._id===id):null;
  const o=Object.assign({},prev||{},{_id:id||uid(),'Request ID':g('t_id'),'Request Date':(prev&&prev['Request Date'])||today(),BU:g('t_bu'),'Project/Campaign':g('t_proj'),'Request Name':g('t_name'),Function:g('t_fn'),'Sub Function':g('t_sub'),Requestor:(prev&&prev.Requestor)||me().name,Source:g('t_src'),Priority:g('t_pr'),Owner:g('t_own'),Status:g('t_st'),'Due Date':g('t_due'),Complexity:g('t_cx'),CreditOverride:g('t_credit'),Progress:g('t_prog'),QC:g('t_qc'),Revisions:g('t_rev'),Satisfaction:g('t_sat'),Notes:g('t_note'),Type:g('t_type'),Cadence:g('t_cad'),Quota:g('t_quota')});
  o.comments=o.comments||[];o.history=o.history||[];
  o.subtasks=MSUBS.map(s=>({...s}));
  if(o.Status==='Done'&&!o['Close Date'])o['Close Date']=today();
  if(o.Status!=='Done')o['Close Date']='';
  if(!prev){logHist(o,'Created task');}
  else{
    if(prev.Status!==o.Status)logHist(o,'Status: '+(prev.Status||'—')+' → '+o.Status);
    if((prev.Owner||'')!==o.Owner)logHist(o,'Owner: '+(prev.Owner||'—')+' → '+o.Owner);
    if(String(prev.Progress||'')!==String(o.Progress||''))logHist(o,'Progress → '+progressOf(o)+'%');
    if((prev.Priority||'')!==o.Priority)logHist(o,'Priority: '+(prev.Priority||'—')+' → '+o.Priority);
    if((prev.QC||'—')!==(o.QC||'—'))logHist(o,'QC → '+(o.QC||'—'));
  }
  if(id){const i=DB.tasks.findIndex(t=>t._id===id);DB.tasks[i]=o;}else DB.tasks.push(o);
  save();mClose();render();
};

/* ---- BACKUP / RESTORE (sao lưu & khôi phục toàn bộ dữ liệu) ---- */
function doBackup(){
  const payload={_type:'fado_mkt_backup',_ver:1,_at:new Date().toISOString(),data:remoteShape()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='FADO_MKT_backup_'+today()+'.json';document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),3000);
}
function doRestore(e){
  const f=e.target.files[0];if(!f){return;}
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const j=JSON.parse(rd.result);
      const d=(j&&j.data)?j.data:j;
      if(!d||!Array.isArray(d.tasks))throw new Error('File không đúng định dạng sao lưu.');
      const when=j&&j._at?(' (sao lưu lúc '+new Date(j._at).toLocaleString('vi-VN')+')'):'';
      if(!confirm('⚠️ KHÔI PHỤC sẽ GHI ĐÈ toàn bộ dữ liệu hiện tại (kể cả trên cloud) bằng dữ liệu trong file'+when+':\n\n• '+(d.tasks||[]).length+' task\n• '+(d.staff||[]).length+' nhân sự\n• '+(d.users||[]).length+' tài khoản\n\nTiếp tục?'))return;
      DB.users=d.users||DB.users;DB.depts=d.depts||DB.depts;DB.staff=d.staff||DB.staff;DB.tasks=d.tasks||[];if(d.gsheet)DB.gsheet=d.gsheet;
      save();buildMenu();render();
      alert('✓ Đã khôi phục '+(d.tasks||[]).length+' task. Dữ liệu đã được lưu lên cloud.');
    }catch(err){alert('Không đọc được file: '+err.message);}
  };
  rd.readAsText(f);
  e.target.value='';
}
function doClearTasks(){
  const n=DB.tasks.length;
  if(!confirm('⚠️ XÓA SẠCH toàn bộ '+n+' task?\n\nGiữ lại: tài khoản, nhân sự, phòng ban.\nNên bấm "Tải bản sao lưu" trước.\n\nKHÔNG hoàn tác được. Tiếp tục?'))return;
  if(!confirm('Xác nhận lần cuối: xóa hết '+n+' task để làm lại từ đầu?'))return;
  DB.tasks=[];save();buildMenu();render();
  alert('✓ Đã xóa sạch '+n+' task. Hệ thống trống, sẵn sàng nhận yêu cầu mới từ Cổng BU.');
}

};

/* ---- RECURRING (Công việc định kỳ) ---- */
function rRecurring(c,ta){
  const u=me();
  const canMgr=['admin','manager','lead'].includes(u.role);
  if(canMgr){ta.innerHTML=`<button class="btn gold" id="recNew">+ Việc định kỳ</button>`;setTimeout(()=>{const b=document.getElementById('recNew');if(b)b.onclick=()=>taskModal(null,'Định kỳ');},0);}
  const all=visibleTasks().filter(isRecurring);
  if(!all.length){c.innerHTML=emptyBox('Chưa có công việc định kỳ.<br>Bấm <b>+ Việc định kỳ</b> để tạo.');return;}
  const stats=all.map(t=>recStatus(t));
  const ok=stats.filter(s=>s.ok).length, partial=stats.filter(s=>!s.ok&&s.done>0).length, behind=all.length-ok-partial;
  const owners=[...new Set(all.map(t=>t.Owner||'(chưa giao)'))].sort((a,b)=>a.localeCompare(b,'vi'));
  const canCheckT=t=>canMgr||t.Owner===u.name;
  const card=t=>{
    const s=recStatus(t),cc=canCheckT(t),miss=recMissedPrev(t);
    const bg=s.ok?'#3f8a63':(s.done>0?'#b58a3a':'#b4524f');
    const ctrl=!cc?`<span style="font-size:13px;font-weight:700;color:${bg}">${s.q?s.done+'/'+s.q:(s.ok?'✓ đã làm':'chưa làm')}</span>`:(s.q?
      `<div style="display:flex;align-items:center;justify-content:flex-end;gap:6px">
        <button onclick="recSet('${t._id}','${s.key}',${s.done-1})" ${s.done<=0?'disabled':''} style="width:28px;height:28px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:15px;font-weight:700;opacity:${s.done<=0?.4:1}">−</button>
        <span style="font-size:15px;font-weight:800;min-width:48px;text-align:center;color:${bg}">${s.done}/${s.q}</span>
        <button onclick="recSet('${t._id}','${s.key}',${s.done+1})" style="width:28px;height:28px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:15px;font-weight:700">+</button>
      </div>`:
      `<button onclick="recSet('${t._id}','${s.key}',${s.ok?0:1})" style="padding:7px 13px;border-radius:8px;border:1px solid ${s.ok?'#3f8a63':'var(--line)'};background:${s.ok?'#3f8a63':'#fff'};color:${s.ok?'#fff':'var(--ink2)'};font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit">${s.ok?'✓ Đã làm kỳ này':'Đánh dấu đã làm'}</button>`);
    const hist=recentPeriods(s.cad,10).map(k=>{const cnt=periodCount(t,k),met=s.q?cnt>=s.q:cnt>=1,par=cnt>0&&!met,cur=k===s.key;return `<span title="${periodLabel(s.cad,k)}: ${cnt}${s.q?'/'+s.q:''}" style="width:14px;height:14px;border-radius:3px;background:${met?'#3f8a63':(par?'#d8b772':'#e9ebef')};display:inline-block;${cur?'outline:2px solid #17191f;outline-offset:1px':''}"></span>`;}).join('');
    return `<div style="display:flex;align-items:center;gap:14px;padding:12px 14px;border:1px solid var(--line);${miss?'border-left:3px solid #b4524f;':''}border-radius:10px;background:#fff">

/* ---- MANAGER SCORECARD (KPI điều phối vs mục tiêu) ---- */
const MGR_TARGET={onTime:90,waitDays:2,stalePct:10,overduePct:10};
function ragColor(state){return state==='g'?'#3f8a63':(state==='a'?'#b58a3a':'#b4524f');}
function rScorecard(c,ta){
  const base=roleTasks();
  const open=base.filter(t=>!isClosed(t)&&!isRecurring(t));
  const active=open.length;
  // On-time
  const ot=onTimeRate(base);
  const otState=ot==null?'a':(ot>=MGR_TARGET.onTime?'g':(ot>=75?'a':'r'));
  // Overdue
  const ov=open.filter(t=>dueState(t)==='overdue');
  const ovPct=active?Math.round(ov.length/active*100):0;
  const ovState=ovPct<=5?'g':(ovPct<=MGR_TARGET.overduePct?'a':'r');
  // Stale (chưa cập nhật)
  const stale=open.filter(isStale).sort((a,b)=>(daysSinceUpdate(b)||0)-(daysSinceUpdate(a)||0));
  const stalePct=active?Math.round(stale.length/active*100):0;
  const stState=stalePct<=3?'g':(stalePct<=MGR_TARGET.stalePct?'a':'r');
  // Intake — yêu cầu chờ giao & tuổi chờ
  const unassigned=base.filter(t=>!isClosed(t)&&!t.Owner);
  const ageOf=t=>{const d=parseDate(t['Request Date']);return d?Math.max(0,Math.floor((Date.now()-d.getTime())/86400000)):null;};
  const waits=unassigned.map(ageOf).filter(n=>n!=null);
  const avgWait=waits.length?Math.round(waits.reduce((a,b)=>a+b,0)/waits.length):0;
  const waitState=unassigned.length===0?'g':(avgWait<=MGR_TARGET.waitDays?'g':(avgWait<=4?'a':'r'));
  // Done this month
  const [mf,mt]=dRange('month');
  const doneMonth=base.filter(t=>t.Status==='Done'&&(t['Close Date']||'')>=mf&&(t['Close Date']||'')<=mt).length;
  const card=(lab,val,sub,state,target)=>`<div class="kpi" style="position:relative">
    <div class="bar" style="background:${ragColor(state)}"></div>
    <div style="display:flex;align-items:center;justify-content:space-between"><div class="lab">${lab}</div><span style="width:9px;height:9px;border-radius:50%;background:${ragColor(state)};flex-shrink:0"></span></div>
    <div class="num" style="color:${ragColor(state)}">${val}</div>
    <div class="note">${sub}</div>
    <div style="font-size:10.5px;color:var(--muted);margin-top:5px;padding-top:6px;border-top:1px solid #f1f2f5">🎯 Mục tiêu: ${target}</div>
  </div>`;
  const allGreen=[otState,ovState,stState,waitState].every(s=>s==='g');
  const banner=`<div style="display:flex;align-items:center;gap:12px;background:${allGreen?'#e9f3ee':'#fbf6ec'};border:1px solid ${allGreen?'#cfe6da':'#f0e2c4'};border-radius:12px;padding:14px 17px;margin-bottom:16px">
    <span style="font-size:22px">${allGreen?'✅':'⚠️'}</span>
    <div style="font-size:13px;line-height:1.55;color:var(--ink2)">${allGreen?'<b>Mọi chỉ số điều phối đang đạt mục tiêu.</b> Giữ nhịp như hiện tại.':'<b>Có chỉ số cần chú ý.</b> Tập trung vào các ô màu vàng/đỏ bên dưới — chúng phản ánh trực tiếp chất lượng điều phối của bạn.'}</div>
  </div>`;
  const lineT=t=>`<div data-open="${t._id}" style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:9px 0;border-bottom:1px solid #f1f2f5">
    <span class="pr pr-${t.Priority}">${esc(t.Priority||'')}</span>
    <span style="flex:1;font-size:12.5px;font-weight:500;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t['Request Name'])}</span>
    <span style="font-size:11.5px;color:var(--muted)">${esc(t.Owner||'chưa giao')}</span>
    ${t.Function?`<span class="bu-tag">${esc(t.Function)}</span>`:''}
  </div>`;
  const oldestUn=unassigned.slice().sort((a,b)=>(a['Request Date']||'9999').localeCompare(b['Request Date']||'9999'));
  c.innerHTML=`${banner}
  <div class="kpis" style="grid-template-columns:repeat(4,1fr)">
    ${card('ĐÚNG HẠN (ON-TIME)',ot==null?'—':ot+'%',doneMonth+' việc xong tháng này',otState,'≥ '+MGR_TARGET.onTime+'%')}
    ${card('QUÁ HẠN',ov.length,ovPct+'% trên '+active+' việc đang mở',ovState,'≤ '+MGR_TARGET.overduePct+'% việc mở')}
    ${card('CHƯA CẬP NHẬT',stale.length,'≥'+STALE_DAYS+' ngày không động tới · '+stalePct+'%',stState,'càng ít càng tốt')}
    ${card('YÊU CẦU CHỜ GIAO',unassigned.length,unassigned.length?('chờ TB '+avgWait+' ngày'):'không tồn đọng',waitState,'giao trong ≤ '+MGR_TARGET.waitDays+' ngày')}
  </div>
  <div class="grid2">
    <div class="panel"><h3><span class="dot" style="background:var(--purple)"></span>Task lâu chưa cập nhật <span style="font-size:11.5px;color:var(--muted);font-weight:500">· cần nhắc người làm / Lead</span></h3>
      ${stale.length?`<div>${stale.slice(0,8).map(t=>`<div data-open="${t._id}" style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:9px 0;border-bottom:1px solid #f1f2f5"><span style="width:8px;height:8px;border-radius:50%;background:${STCOLOR[t.Status]||'#9aa3b8'};flex-shrink:0"></span><span style="flex:1;font-size:12.5px;font-weight:500;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t['Request Name'])}</span><span style="font-size:11.5px;color:var(--muted)">${esc(t.Owner||'chưa giao')}</span><span style="font-size:11px;font-weight:700;color:#6b5e9c;width:54px;text-align:right">${daysSinceUpdate(t)} ngày</span></div>`).join('')}${stale.length>8?`<div style="font-size:11.5px;color:var(--muted);padding-top:9px">+ ${stale.length-8} task khác…</div>`:''}</div>`:'<div style="color:var(--muted);font-size:12.5px">Mọi task đều được cập nhật gần đây. 🎉</div>'}
    </div>
    <div class="panel"><h3><span class="dot" style="background:var(--gold)"></span>Yêu cầu chờ giao lâu nhất <span style="font-size:11.5px;color:var(--muted);font-weight:500">· giao Lead sớm</span></h3>
      ${oldestUn.length?`<div>${oldestUn.slice(0,8).map(t=>{const a=ageOf(t);return `<div data-open="${t._id}" style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:9px 0;border-bottom:1px solid #f1f2f5"><span class="pr pr-${t.Priority}">${esc(t.Priority||'P3')}</span><span style="flex:1;font-size:12.5px;font-weight:500;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t['Request Name'])}</span><span class="bu-tag">${esc(t.BU||'—')}</span><span style="font-size:11px;font-weight:700;color:${a>MGR_TARGET.waitDays?'#b4524f':'var(--muted)'};width:54px;text-align:right">${a==null?'—':a+' ngày'}</span></div>`;}).join('')}${oldestUn.length>8?`<div style="font-size:11.5px;color:var(--muted);padding-top:9px">+ ${oldestUn.length-8} yêu cầu khác…</div>`:''}</div>`:'<div style="color:var(--muted);font-size:12.5px">Không có yêu cầu nào đang chờ giao. 🎉</div>'}
    </div>
  </div>`;
  c.querySelectorAll('[data-open]').forEach(e=>e.addEventListener('click',()=>taskDetail(e.dataset.open)));
}

/* ---- STAFF PERFORMANCE (Hiệu suất nhân sự) ---- */
let PERF='month';
let _PERF_EXPORT={rows:[],rangeLbl:''};
function exportPerf(){
  if(typeof XLSX==='undefined'){alert('Không tải được thư viện Excel. Kiểm tra kết nối mạng rồi thử lại.');return;}
  const {rows,rangeLbl}=_PERF_EXPORT;
  if(!rows||!rows.length){alert('Không có dữ liệu để xuất.');return;}
  const data=rows.map((r,i)=>({
    'Hạng':i+1,
    'Nhân sự':r.o,
    'Việc xong':r.done,
    'Credit':r.credit,
    'Lượt định kỳ':r.recUnits,
    'Đúng hạn (%)':r.ot==null?'':r.ot,
    'Việc lặt vặt (XS)':r.micro,
    'Điểm':r.score
  }));
  const ws=XLSX.utils.json_to_sheet(data);
  ws['!cols']=[{wch:6},{wch:28},{wch:11},{wch:9},{wch:13},{wch:13},{wch:17},{wch:8}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Hieu suat');
  XLSX.writeFile(wb,'FADO_MKT_HieuSuat_'+(PERF)+'_'+today()+'.xlsx');
}

  const rows=owners.map(o=>{const my=ts.filter(t=>t.Owner===o);const load=sumCredit(my);const cap=capOf(o);return {o,load,cap,n:my.length,pv:Math.round(load/cap*100)};}).sort((a,b)=>b.pv-a.pv);

}

/* ---- PROGRESS REPORT (Báo cáo tiến độ theo Function/Lead) ---- */
function rProgress(c,ta){
  if(ta){ta.innerHTML=`<button class="btn ghost" id="pgExp"><span>↓</span> Xuất Excel</button>`;setTimeout(()=>{const b=document.getElementById('pgExp');if(b)b.onclick=()=>exportTaskRows(roleTasks(),'FADO_MKT_TienDoTheoLead_'+today()+'.xlsx','TienDo');},0);}
  const base=roleTasks();
  const funcs=[...new Set([
    ...DB.users.filter(u=>u.role==='lead'&&u.func).map(u=>u.func),
    ...base.map(t=>t.Function).filter(Boolean)
  ])];
  if(!funcs.length){c.innerHTML=emptyBox('Chưa có Function/Lead nào.<br>Tạo tài khoản <b>Function Lead</b> ở ADMIN → Accounts & Roles.');return;}
  const rows=funcs.map(f=>{
    const lead=DB.users.find(u=>u.role==='lead'&&u.func===f);
    const ts=base.filter(t=>t.Function===f);
    const open=ts.filter(t=>!isClosed(t));
    const openNR=open.filter(t=>!isRecurring(t));
    const stale=openNR.filter(isStale).sort((a,b)=>(daysSinceUpdate(b)||0)-(daysSinceUpdate(a)||0));
    const ups=openNR.map(daysSinceUpdate).filter(n=>n!=null);
    const freshest=ups.length?Math.min(...ups):null;
    return {f,lead,ts,open,stale,freshest};
  }).sort((a,b)=>(b.stale.length-a.stale.length)||((b.freshest==null?-1:b.freshest)-(a.freshest==null?-1:a.freshest)));
  const okN=rows.filter(r=>r.open.length===0||(r.freshest!=null&&r.freshest<=7)).length;
  const lateN=rows.length-okN;
  const kc=(lab,num,note,col)=>`<div class="kpi"><div class="bar" style="background:${col}"></div><div class="lab">${lab}</div><div class="num">${num}</div><div class="note">${note}</div></div>`;
  const card=r=>{
    const f=r.f,lead=r.lead,ts=r.ts,open=r.open;
    const done=ts.filter(t=>t.Status==='Done').length;
    const pct=ts.length?Math.round(done/ts.length*100):0;
    const ot=onTimeRate(ts);
    const risk=open.filter(t=>dueState(t)==='overdue'||t.Health==='Blocked'||t.Health==='Difficulty')
      .sort((a,b)=>(a['Due Date']||'9999').localeCompare(b['Due Date']||'9999'));
    const active=open.filter(t=>!risk.includes(t)).sort((a,b)=>(a['Due Date']||'9999').localeCompare(b['Due Date']||'9999'));
    const staleOnly=r.stale.filter(t=>!risk.includes(t));
    const fresh=open.length===0?'g':(r.freshest==null?'r':(r.freshest<=7?'g':'r'));
    const statusTxt=open.length===0?'Không có task đang mở':(r.freshest==null?'Chưa từng cập nhật':(r.freshest<=7?('✓ Cập nhật '+(r.freshest===0?'hôm nay':r.freshest+' ngày trước')):('⚠ '+r.freshest+' ngày chưa cập nhật')));
    const statusCol=fresh==='g'?'#3f8a63':'#b4524f';
    const stat=(l,v,col)=>`<div style="text-align:center"><div style="font-size:22px;font-weight:800;color:${col||'var(--ink)'};letter-spacing:-.5px">${v}</div><div style="font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px">${l}</div></div>`;
    const line=t=>`<div onclick="taskDetail('${t._id}')" style="display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid #f1f2f5;cursor:pointer">
        <span style="width:8px;height:8px;border-radius:50%;background:${STCOLOR[t.Status]||'#9aa3b8'};flex-shrink:0"></span>
        <span style="flex:1;font-size:12.5px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t['Request Name'])}</span>
        ${t.Health&&t.Health!=='On track'?healthPill(t.Health):''}
        ${dueBadge(t)}
        <span style="font-size:11.5px;color:var(--muted);flex-shrink:0">${esc(t.Owner||'chưa giao')}</span>
        <span style="font-size:11px;font-weight:700;color:var(--ink2);width:34px;text-align:right;flex-shrink:0">${progressOf(t)}%</span>
      </div>`;
    const lineU=t=>`<div onclick="taskDetail('${t._id}')" style="display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid #f1f2f5;cursor:pointer">
        <span style="width:8px;height:8px;border-radius:50%;background:${STCOLOR[t.Status]||'#9aa3b8'};flex-shrink:0"></span>
        <span style="flex:1;font-size:12.5px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t['Request Name'])}</span>
        <span style="font-size:11.5px;color:var(--muted);flex-shrink:0">${esc(t.Owner||'chưa giao')}</span>
        <span style="font-size:11px;font-weight:700;color:#6b5e9c;width:54px;text-align:right;flex-shrink:0">${daysSinceUpdate(t)} ngày</span>
      </div>`;
    const noLead=!lead;
    return `<div class="panel" style="margin-bottom:15px;${fresh==='r'&&open.length?'border-left:3px solid #b4524f':''}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:15px;flex-wrap:wrap">
        <div style="width:40px;height:40px;border-radius:10px;background:${noLead?'#c0392b':'#17191f'};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0">${esc(((lead?lead.name:f)||'?')[0].toUpperCase())}</div>
        <div style="min-width:0"><div style="font-size:15px;font-weight:700;letter-spacing:-.2px">${esc(f)}</div><div style="font-size:12px;color:var(--muted)">${noLead?'<span style="color:#b4524f;font-weight:700">— chưa gán Lead —</span>':'Lead: <b style="color:var(--ink2)">'+esc(lead.name)+'</b>'} · <span style="color:${statusCol};font-weight:600">${statusTxt}</span></div></div>
        <div style="margin-left:auto;display:flex;gap:20px;align-items:center">${stat('Đang làm',open.length)}${stat('Hoàn thành',done,'#3f8a63')}${stat('Rủi ro',risk.length,risk.length?'#b4524f':'#9aa0ac')}${stat('Chưa update',r.stale.length,r.stale.length?'#6b5e9c':'#9aa0ac')}${stat('Đúng hạn',ot==null?'—':ot+'%','#3b6ea5')}</div>
      </div>
      <div style="margin-bottom:14px">${progBar(pct)}</div>
      ${risk.length?`<div style="font-size:11px;font-weight:700;color:#b4524f;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">⚠ Cần chú ý (${risk.length})</div>${risk.map(line).join('')}`:''}
      ${staleOnly.length?`<div style="font-size:11px;font-weight:700;color:#6b5e9c;text-transform:uppercase;letter-spacing:.5px;margin:${risk.length?'14px':'0'} 0 4px">⏳ Lâu chưa cập nhật (${staleOnly.length})</div>${staleOnly.slice(0,6).map(lineU).join('')}`:''}
      ${active.length?`<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:${risk.length||staleOnly.length?'14px':'0'} 0 4px">Đang chạy (${active.length})</div>${active.slice(0,8).map(line).join('')}${active.length>8?`<div style="font-size:11.5px;color:var(--muted);padding-top:8px">+ ${active.length-8} task khác…</div>`:''}`:''}
      ${!open.length?`<div style="font-size:12.5px;color:var(--muted);padding:6px 0">Không có task đang mở trong function này.</div>`:''}
    </div>`;
  };
  c.innerHTML=`<div class="kpis" style="grid-template-columns:repeat(3,1fr)">
    ${kc('FUNCTION / LEAD',rows.length,DB.users.filter(u=>u.role==='lead').length+' Lead có tài khoản','var(--navy)')}
    ${kc('ĐÃ CẬP NHẬT TUẦN NÀY',okN,'có động thái ≤7 ngày','var(--green)')}
    ${kc('⚠ CHƯA CẬP NHẬT',lateN,'cần nhắc Lead báo tiến độ','var(--red)')}
  </div>${rows.map(card).join('')}`;
}

  const ts=visibleTasks();
  const open=ts.filter(t=>!isClosed(t));
  const byDue=(a,b)=>(a['Due Date']||'9999').localeCompare(b['Due Date']||'9999');
  const overdue=open.filter(t=>dueState(t)==='overdue').sort(byDue);
  const soon=open.filter(t=>dueState(t)==='soon').sort(byDue);
  const waiting=open.filter(t=>t.Status==='Waiting'&&dueState(t)!=='overdue');
  const noOwner=open.filter(t=>!t.Owner&&dueState(t)!=='overdue');
  const staleArr=open.filter(t=>isStale(t)&&dueState(t)!=='overdue').sort((a,b)=>(daysSinceUpdate(b)||0)-(daysSinceUpdate(a)||0));
  // KPI bấm để lọc nhanh
  const kpi=(key,l,v,col)=>{const on=BKFILTER===key;return `<div data-bk="${key}" style="flex:1;cursor:pointer;background:${on?'#17191f':'#fff'};border:1px solid ${on?'#17191f':'var(--line)'};border-radius:12px;padding:15px 17px;transition:.12s"><div style="font-size:11px;color:${on?'#cfd3da':'var(--muted)'};font-weight:700;text-transform:uppercase;letter-spacing:.5px">${l}</div><div style="font-size:30px;font-weight:800;letter-spacing:-1px;margin-top:5px;color:${on?'#fff':(col||'var(--ink)')}">${v}</div><div style="font-size:10.5px;color:${on?'#cfd3da':'var(--muted)'};font-weight:600;margin-top:3px">${on?'✓ đang xem':'bấm để lọc'}</div></div>`;};
  const sec=(key,title,col,arr,empty)=>{if(BKFILTER!=='all'&&BKFILTER!==key)return '';return arr.length?`<div class="panel" style="margin-bottom:14px"><h3><span class="dot" style="background:${col}"></span>${title} <span style="color:var(--muted);font-weight:500">(${arr.length})</span></h3>${arr.map(tkRow).join('')}</div>`:(BKFILTER===key?`<div class="panel" style="margin-bottom:14px"><h3><span class="dot" style="background:${col}"></span>${title}</h3>${emptyBox(empty||'Không có task nào.')}</div>`:'');};
  c.innerHTML=`<div style="display:flex;gap:13px;margin-bottom:16px;flex-wrap:wrap">
      ${kpi('all','Tổng tồn đọng',open.length)}
      ${kpi('overdue','Quá hạn',overdue.length,overdue.length?'#b4524f':'#3f8a63')}
      ${kpi('stale','Chưa cập nhật',staleArr.length,staleArr.length?'#6b5e9c':'#3f8a63')}
      ${kpi('soon','Sắp tới hạn',soon.length,soon.length?'#b58a3a':'#3f8a63')}
      ${kpi('noOwner','Chưa giao',noOwner.length,noOwner.length?'#3b6ea5':'#3f8a63')}
    </div>
    ${BKFILTER!=='all'?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:13px"><span style="font-size:12px;color:var(--muted)">Đang lọc theo nhóm đã chọn.</span><button data-bk="all" style="font-size:12px;font-weight:600;border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 11px;cursor:pointer;font-family:inherit">✕ Xem tất cả</button></div>`:''}
    ${sec('overdue','🔴 Quá hạn — xử lý ngay','#b4524f',overdue,'Không có việc quá hạn. 🎉')}
    ${sec('stale','⏳ Lâu chưa cập nhật (≥'+STALE_DAYS+' ngày)','#6b5e9c',staleArr,'Mọi việc đều được cập nhật gần đây.')}
    ${sec('soon','🟡 Sắp tới hạn (≤3 ngày)','#b58a3a',soon,'Không có việc sắp tới hạn.')}
    ${BKFILTER==='all'?sec('waiting','⏸ Đang chờ (Waiting)','#6b5e9c',waiting):''}
    ${sec('noOwner','📥 Chưa giao người làm','#3b6ea5',noOwner,'Mọi việc đã có người làm. 🎉')}
    ${open.length===0?emptyBox('Không có task tồn đọng. 🎉'):(BKFILTER==='all'&&overdue.length+soon.length+waiting.length+noOwner.length+staleArr.length===0?emptyBox('Mọi task đang trong tầm kiểm soát — không có việc quá hạn/đang chờ.'):'')}`;
  c.querySelectorAll('[data-bk]').forEach(e=>e.onclick=()=>{BKFILTER=e.dataset.bk;render();});
}

/* ---- SLA MANAGEMENT ---- */
function rSla(c,ta){
  if(ta){ta.innerHTML=`<button class="btn ghost" id="slaExp"><span>↓</span> Xuất Excel</button>`;setTimeout(()=>{const b=document.getElementById('slaExp');if(b)b.onclick=()=>exportTaskRows(visibleTasks().filter(t=>t['Due Date']),'FADO_MKT_SLA_'+today()+'.xlsx','SLA');},0);}
  const ts=visibleTasks();
  const doneDue=ts.filter(t=>t.Status==='Done'&&t['Due Date']);
  const onTime=doneDue.filter(t=>onOrBefore(t['Close Date']||today(),t['Due Date']));
  const lateDone=doneDue.filter(t=>!onTime.includes(t)).sort((a,b)=>(b['Close Date']||'').localeCompare(a['Close Date']||''));
  const openOverdue=ts.filter(t=>!isClosed(t)&&dueState(t)==='overdue').sort((a,b)=>(a['Due Date']||'').localeCompare(b['Due Date']||''));
  const rate=doneDue.length?Math.round(onTime.length/doneDue.length*100):null;
  const rateCol=rate==null?'var(--muted)':(rate>=90?'#3f8a63':rate>=75?'#b58a3a':'#b4524f');
  const kpi=(l,v,col,sub)=>`<div style="flex:1;background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px"><div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px">${l}</div><div style="font-size:32px;font-weight:800;letter-spacing:-1px;margin-top:5px;color:${col||'var(--ink)'}">${v}</div>${sub?`<div style="font-size:11.5px;color:var(--muted);margin-top:3px">${sub}</div>`:''}</div>`;
  // SLA theo Function
  const funcs=[...new Set(ts.map(t=>t.Function).filter(Boolean))];
  const fnRows=funcs.map(f=>{
    const dd=ts.filter(t=>t.Function===f&&t.Status==='Done'&&t['Due Date']);
    const ot=dd.filter(t=>(t['Close Date']||today())<=t['Due Date']).length;
    const r=dd.length?Math.round(ot/dd.length*100):null;
    const col=r==null?'#9aa0ac':(r>=90?'#3f8a63':r>=75?'#b58a3a':'#b4524f');
    const ov=ts.filter(t=>t.Function===f&&!isClosed(t)&&dueState(t)==='overdue').length;
    return `<tr><td><b>${esc(f)}</b></td><td>${dd.length}</td><td style="color:#b4524f;font-weight:600">${ov||''}</td><td><div style="display:flex;align-items:center;gap:9px"><div style="flex:1;height:8px;background:#eef0f3;border-radius:5px;overflow:hidden;min-width:80px"><div style="height:100%;width:${r==null?0:r}%;background:${col};border-radius:5px"></div></div><span style="font-size:12px;font-weight:700;color:${col};width:42px;text-align:right">${r==null?'—':r+'%'}</span></div></td></tr>`;
  }).join('');
  c.innerHTML=`<div style="display:flex;gap:13px;margin-bottom:16px">
      ${kpi('SLA đúng hạn',rate==null?'—':rate+'%',rateCol,onTime.length+'/'+doneDue.length+' task done đúng hạn')}
      ${kpi('Hoàn thành trễ',lateDone.length,lateDone.length?'#b4524f':'#3f8a63','đóng sau hạn')}
      ${kpi('Đang quá hạn',openOverdue.length,openOverdue.length?'#b4524f':'#3f8a63','chưa đóng, đã trễ')}
    </div>
    ${funcs.length?`<div class="panel" style="margin-bottom:14px"><h3><span class="dot" style="background:var(--ink)"></span>SLA theo Function</h3><div class="tablewrap"><table><thead><tr><th>Function</th><th>Done</th><th>Đang trễ</th><th>SLA đúng hạn</th></tr></thead><tbody>${fnRows}</tbody></table></div></div>`:''}
    ${openOverdue.length?`<div class="panel" style="margin-bottom:14px"><h3><span class="dot" style="background:#b4524f"></span>⚠ Đang vi phạm SLA (chưa đóng, đã quá hạn) <span style="color:var(--muted);font-weight:500">(${openOverdue.length})</span></h3>${openOverdue.map(tkRow).join('')}</div>`:''}
    ${lateDone.length?`<div class="panel"><h3><span class="dot" style="background:#b58a3a"></span>Đã hoàn thành nhưng trễ hạn <span style="color:var(--muted);font-weight:500">(${lateDone.length})</span></h3>${lateDone.map(tkRow).join('')}</div>`:''}
    ${doneDue.length===0&&openOverdue.length===0?emptyBox('Chưa đủ dữ liệu SLA. Cần task có Due Date và đã hoàn thành để đo % đúng hạn.'):''}`;
}

/* ---- REPORT (b\u1ea3ng theo ng\u01b0\u1eddi/BU/\u01b0u ti\u00ean \u2014 nh\u00fang trong Hi\u1ec7u su\u1ea5t) ---- */
function reportTablesHtml(ts){
  if(!ts.length)return '';
  const owners=[...new Set(ts.map(t=>t.Owner).filter(Boolean))];
  return `<div class="panel" style="margin-top:16px"><h3 style="display:flex;align-items:center;gap:10px"><span class="dot" style="background:var(--purple)"></span>Chi tiết theo người <span style="font-size:11.5px;color:var(--muted);font-weight:500">· tổng & % credit (không theo kỳ)</span><button class="btn ghost sm" id="expReport" style="margin-left:auto">↓ Bảng này (Excel)</button></h3>
    <div style="overflow-x:auto"><table><thead><tr><th>Person</th><th>Total tasks</th><th>In progress</th><th>Completed</th><th>Credit (done/total)</th><th>% credit done</th></tr></thead><tbody>
    ${owners.map(o=>{const my=ts.filter(t=>t.Owner===o);const d=my.filter(t=>t.Status==='Done').length;const w=my.filter(t=>t.Status==='WIP').length;const tc=sumCredit(my),dc=sumCredit(my.filter(t=>t.Status==='Done'));return `<tr><td><b>${esc(o)}</b></td><td>${my.length}</td><td>${w}</td><td>${d}</td><td><b>${dc}</b> / ${tc}</td><td><span class="pill st-Done">${pct(dc,tc)}%</span></td></tr>`;}).join('')}
    </tbody></table></div></div>
    <div class="grid2">
      <div class="panel"><h3><span class="dot" style="background:var(--gold)"></span>By BU</h3>${bars(gc(ts,'BU'),(k,i)=>BUCOLOR[i%BUCOLOR.length])}</div>
      <div class="panel"><h3><span class="dot" style="background:var(--red)"></span>By Priority</h3>${bars(gc(ts,'Priority'),k=>PRCOLOR[k]||'#9aa3b8')}</div>
    </div>`;
}
function exportReport(){
  if(typeof XLSX==='undefined'){alert('Không tải được thư viện Excel. Kiểm tra kết nối mạng rồi thử lại.');return;}
  const ts=visibleTasks();
  if(!ts.length){alert('Không có dữ liệu để xuất.');return;}
  const owners=[...new Set(ts.map(t=>t.Owner).filter(Boolean))];
  const data=owners.map(o=>{const my=ts.filter(t=>t.Owner===o);const d=my.filter(t=>t.Status==='Done').length;const w=my.filter(t=>t.Status==='WIP').length;const tc=sumCredit(my),dc=sumCredit(my.filter(t=>t.Status==='Done'));return {
    'Person':o,'Total tasks':my.length,'In progress':w,'Completed':d,'Credit done':dc,'Credit total':tc,'% credit done':pct(dc,tc)
  };});
  const ws=XLSX.utils.json_to_sheet(data);
  ws['!cols']=[{wch:26},{wch:12},{wch:12},{wch:11},{wch:11},{wch:12},{wch:13}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Performance');
  XLSX.writeFile(wb,'FADO_MKT_Report_'+today()+'.xlsx');
}

/* ---- KANBAN ---- */
function rKanban(c,ta){
  const u=me();
  if(['admin','manager','lead'].includes(u.role)){
    ta.innerHTML=`<button class="btn gold" id="kNew">+ New Task</button>`;
    setTimeout(()=>{const b=document.getElementById('kNew');if(b)b.addEventListener('click',()=>taskModal());},0);
  }
  const ts=visibleTasks();
  const cols=CATS.Status; // Open, WIP, Waiting, Done, Cancelled
  // Quyền kéo theo từng task: admin/manager kéo tất cả · lead kéo task trong function mình · nhân viên chỉ kéo task của mình
  const canDragTask=t=>{
    if(['admin','manager'].includes(u.role))return true;
    if(u.role==='lead')return t.Function===u.func||t.Owner===u.name;
    return t.Owner===u.name;
  };
  const anyDrag=ts.some(canDragTask);
  c.innerHTML=`<div style="overflow-x:auto;padding-bottom:10px"><div style="display:flex;gap:13px;min-width:max-content">
    ${cols.map(st=>{
      const items=ts.filter(t=>t.Status===st);
      return `<div class="kcol" data-st="${st}" style="width:265px;flex-shrink:0;background:#eef1f7;border-radius:13px;padding:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 6px 10px">
          <span style="font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px"><span style="width:9px;height:9px;border-radius:50%;background:${STCOLOR[st]||'#9aa3b8'}"></span>${st}</span>
          <span style="background:#fff;border-radius:20px;font-size:11px;font-weight:700;padding:2px 9px;color:var(--muted)">${items.length}</span>
        </div>
        <div class="kdrop" data-st="${st}" style="min-height:60px">
          ${items.map(t=>{const dg=canDragTask(t);const mine=t.Owner===u.name||(t.subtasks||[]).some(s=>s.owner===u.name);return `<div class="kcard" draggable="${dg}" data-id="${t._id}" data-drag="${dg?1:0}" onclick="taskDetail('${t._id}')" style="background:${mine?'#fff8ec':'#fff'};border-radius:10px;padding:11px 12px;margin-bottom:9px;border:1px solid ${mine?'#e9cf94':'var(--line)'};${mine?'border-left:3px solid #caa83d;':''}cursor:${dg?'grab':'pointer'};${dg?'':'opacity:.82'}">
            ${mine?'<div style="display:inline-block;background:#caa83d;color:#1c1a12;font-size:9.5px;font-weight:800;letter-spacing:.3px;padding:2px 7px;border-radius:5px;margin-bottom:7px">★ CỦA TÔI</div>':''}
            <div style="font-size:12.5px;font-weight:600;line-height:1.35;margin-bottom:7px">${dg?'':'<span title="Bạn không có quyền kéo task này" style="color:#aab2c5">🔒 </span>'}${esc(t['Request Name'])}</div>
            <div style="display:flex;align-items:center;justify-content:space-between">
              <span class="pr pr-${t.Priority}">${esc(t.Priority)}</span>
              <span class="bu-tag">${esc(t.BU)}</span>
            </div>
            <div style="font-size:11px;color:var(--muted);margin-top:6px">👤 ${esc(t.Owner||'chưa giao')}${t['Due Date']?' · ':''}${t['Due Date']?dueBadge(t)||('⏰ '+esc(t['Due Date'])):''}</div>
          </div>`;}).join('')||`<div style="font-size:11.5px;color:#aab2c5;text-align:center;padding:14px">trống</div>`}
        </div>
      </div>`;
    }).join('')}
  </div></div>`;
  wireDrag(canDragTask);
}
let dragId=null;
function wireDrag(canDragTask){
  document.querySelectorAll('.kcard').forEach(card=>{
    if(card.dataset.drag!=='1')return; // chỉ thẻ được phép mới kéo được
    card.addEventListener('dragstart',e=>{dragId=card.dataset.id;card.style.opacity='.4';});
    card.addEventListener('dragend',e=>{card.style.opacity='1';});
  });
  document.querySelectorAll('.kdrop').forEach(drop=>{
    drop.addEventListener('dragover',e=>{e.preventDefault();drop.parentElement.style.background='#e3e9f5';});
    drop.addEventListener('dragleave',e=>{drop.parentElement.style.background='#eef1f7';});
    drop.addEventListener('drop',e=>{
      e.preventDefault();drop.parentElement.style.background='#eef1f7';
      if(!dragId)return;
      const t=DB.tasks.find(x=>x._id===dragId);
      if(t&&canDragTask&&!canDragTask(t)){dragId=null;return;} // chặn kéo task không thuộc quyền
      if(t&&t.Status!==drop.dataset.st){const old=t.Status;t.Status=drop.dataset.st;if(t.Status==='Done'&&!t['Close Date'])t['Close Date']=today();if(t.Status!=='Done')t['Close Date']='';logHist(t,'Status: '+(old||'—')+' → '+t.Status+' (Kanban)');save();render();}
      dragId=null;
    });
  });
}

function importBackup(e){

function csvFromSheetUrl(url){
  url=(url||'').trim();
  if(!url)return '';
  if(/output=csv|format=csv|tqx=out:csv/.test(url))return url; // đã là link CSV
  const m=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9\-_]+)/);
  if(!m)return url;
  let gid='0';const g=url.match(/[#&?]gid=([0-9]+)/);if(g)gid=g[1];
  return `https://docs.google.com/spreadsheets/d/${m[1]}/gviz/tq?tqx=out:csv&gid=${gid}`;
}
const HALIAS={'dấu thời gian':'Request Date','timestamp':'Request Date','tên công việc / yêu cầu':'Request Name','tên công việc':'Request Name','tên yêu cầu':'Request Name','dự án / bu':'BU','dự án':'BU','loại công việc':'Function','người yêu cầu':'Requestor','người gửi':'Requestor','mức ưu tiên':'Priority','hạn mong muốn':'Due Date','mô tả chi tiết yêu cầu':'Notes','mô tả chi tiết':'Notes','mô tả':'Notes','ghi chú':'Notes'};
function matchField(h){
  const x=(h||'').trim().toLowerCase();
  const xf=XF.find(f=>f.toLowerCase()===x);if(xf)return xf;       // khớp tên cột CRM (tiếng Anh)
  if(HALIAS[x])return HALIAS[x];                                  // khớp tên tiếng Việt
  if(x.includes('đính kèm')||x.includes('attachment')||(x.includes('link')&&x.includes('tài liệu')))return 'Attachment';
  if(x.includes('mô tả')||x==='notes')return 'Notes';
  if(x.includes('ưu tiên')||x==='priority')return 'Priority';
  if(x.includes('hạn')||x.includes('due'))return 'Due Date';
  if(x.includes('người yêu cầu')||x.includes('requestor'))return 'Requestor';
  if(x.includes('loại công việc')||x==='function')return 'Function';
  if(x.includes('dự án')||x==='bu')return 'BU';
  if(x.includes('tên')&&(x.includes('việc')||x.includes('yêu cầu')))return 'Request Name';
  if(x.includes('thời gian')||x.includes('timestamp'))return 'Request Date';
  return null;
}
function natKey(o){const n=(o['Request Name']||'').trim().toLowerCase();if(!n)return '';return n+'|'+(o['Request Date']||'').trim()+'|'+(o.Requestor||'').trim().toLowerCase();}
function importCsvRows(txt){
  const rows=parseCsv(txt);
  if(rows.length<2)return{n:0,skip:0,err:'File rỗng hoặc sai định dạng.'};
  const hdr=rows[0].map(h=>h.trim());
  const idx={};hdr.forEach((h,i)=>{const f=matchField(h);if(f&&idx[f]==null)idx[f]=i;});
  const idSet=new Set(DB.tasks.map(t=>t['Request ID']).filter(Boolean));
  const keySet=new Set(DB.tasks.map(natKey).filter(Boolean));
  let n=0,skip=0;
  for(let r=1;r<rows.length;r++){
    const row=rows[r];if(!row.length||row.every(x=>!x))continue;
    const o={_id:uid()};XF.forEach(f=>{o[f]=idx[f]!=null?(row[idx[f]]||'').trim():'';});
    if(!o['Request Name']&&!o['Request ID']){continue;}
    // tự phân loại Function nếu trống/không hợp lệ (auto-tag theo từ khóa)
    if(!o.Function||!CATS.Function.includes(o.Function)){
      const d=detectFn((o['Request Name']||'')+' '+(o.Notes||''));
      o.Function=d.f;if(!o['Sub Function'])o['Sub Function']=d.s;
    }
    if(!o.Source)o.Source='New Request';
    if(o['Request ID']&&idSet.has(o['Request ID'])){skip++;continue;}
    const k=natKey(o);if(k&&keySet.has(k)){skip++;continue;}
    if(!o['Request ID'])o['Request ID']=autoId();
    if(!o['Request Date'])o['Request Date']=today();
    o.Status=o.Status||'Open';o.Priority=(o.Priority||'P3').match(/P[1-4]/)?o.Priority.match(/P[1-4]/)[0]:'P3';
    DB.tasks.push(o);idSet.add(o['Request ID']);if(k)keySet.add(k);n++;
  }
  DB.gsheet.lastSync=new Date().toLocaleString('en-GB');DB.gsheet.lastN=n;save();
  return{n,skip};
}
function pullCsv(){
  const url=document.getElementById('gs_csv').value.trim();
  if(!url){alert('Paste a CSV link first');return;}
  DB.gsheet.csvUrl=url;
  const res=document.getElementById('gsResult');res.textContent='⏳ Pulling data...';
  fetch(csvFromSheetUrl(url)).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.text();}).then(txt=>{
    const {n,skip,err}=importCsvRows(txt);
    if(err){res.innerHTML='<span style="color:var(--red)">'+err+'</span>';return;}
    res.innerHTML=`<span style="color:var(--green)">✓ Added ${n} rows${skip?(' · skipped '+skip+' duplicates'):''}.</span>`;
  }).catch(e=>{res.innerHTML='<span style="color:var(--red)">Error: '+e.message+'. Check the link is Published to web as CSV.</span>';});
}
function parseCsv(txt){
  const rows=[];let row=[],cell='',q=false;
  for(let i=0;i<txt.length;i++){const ch=txt[i];
    if(q){if(ch==='"'){if(txt[i+1]==='"'){cell+='"';i++;}else q=false;}else cell+=ch;}
    else{if(ch==='"')q=true;else if(ch===','){row.push(cell);cell='';}else if(ch==='\n'){row.push(cell);rows.push(row);row=[];cell='';}else if(ch!=='\r')cell+=ch;}
  }
  if(cell||row.length){row.push(cell);rows.push(row);}
  return rows;
}


/* ---- SCOPE IMPORTER (reads every employee tab of the Scope workbook) ---- */
function mapBU(b){
  const t=(b||'').toLowerCase();
  if(t.includes('micafi'))return 'MICAFI';
  if(t.includes('fado solution')||t.includes('fds'))return 'FDS';
  if(t.includes('168'))return 'Fado168';
  if(t.includes('ratraco'))return 'Ratraco';
  if(t.includes('proship'))return 'Proship';
  if(t.includes('eurogo'))return 'EuroGo';
  if(t.includes('goprint'))return 'GoPrint';
  if(t.includes('fado vn')||t.includes('fado.vn'))return 'Fado VN';
  if(t.includes('wind'))return 'The Winds';
  if(t.includes('internal'))return 'Internal Project';
  if(t.includes('bod')||t.includes('ceo'))return 'BOD/CEO';
  return (b||'Internal Project').replace(/\(.*?\)/g,'').trim()||'Internal Project';
}
function detectFn(s){
  const t=(s||'').toLowerCase();
  if(/google ads|adwords/.test(t))return{f:'Performance',s:'Google Ads'};
  if(/facebook ads|fb ads/.test(t))return{f:'Performance',s:'Facebook Ads'};
  if(/tiktok ads/.test(t))return{f:'Performance',s:'TikTok Ads'};
  if(/zalo ads/.test(t))return{f:'Performance',s:'Zalo Ads'};
  if(/\bads\b|quảng cáo|retarget/.test(t))return{f:'Performance',s:'Performance'};
  if(/report|báo cáo/.test(t))return{f:'Marketing Operation',s:'Reporting'};
  if(/event|sự kiện|campaign/.test(t))return{f:'Content & Creative',s:'Campaign Planning'};
  if(/seo|geo|backlink|keyword/.test(t))return{f:'Content & Creative',s:'SEO'};
  if(/website|web |ux|ui|wordpress|landing|ladipage|giao diện/.test(t))return{f:'Marketing Operation',s:'Website'};
  if(/email/.test(t))return{f:'Content & Creative',s:'Content'};
  if(/content|social|bài viết|fanpage|youtube|telegram|tiktok|facebook|zalo|banner|video|seeding/.test(t))return{f:'Content & Creative',s:'Content'};
  return{f:'Marketing Operation',s:''};
}
function importScope(e){
  const f=e.target.files[0];if(!f)return;
  const skip=['scope 2026','working file','template','scope','readme','huong dan','hướng dẫn'];
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      let n=0,people=0;
      wb.SheetNames.forEach(sn=>{
        if(skip.includes(sn.trim().toLowerCase()))return;
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
        let hr=-1;
        for(let i=0;i<Math.min(rows.length,12);i++){if(rows[i].some(c=>String(c).toLowerCase().includes('scope & breakdown'))){hr=i;break;}}
        if(hr<0)return;
        const hdr=rows[hr].map(c=>String(c).trim().toLowerCase());
        const col=k=>hdr.findIndex(h=>h.includes(k));
        const ci={biz:col('business'),scope:col('scope & breakdown'),note:col('note'),pr:col('priority'),per:col('personnel'),period:col('period'),newp:col('new personnel')};
        if(ci.scope<0)return;
        let owner=sn.trim();
        // prefer full name from a 'Name:' cell if present
        for(let i=0;i<hr;i++){const c=(rows[i]||[]).map(x=>String(x)).find(x=>/name\s*:/i.test(x));if(c){owner=c.replace(/.*name\s*:/i,'').trim()||owner;break;}}
        let curBU='';people++;
        for(let r=hr+1;r<rows.length;r++){
          const row=rows[r]||[];
          const biz=String(row[ci.biz]||'').trim();if(biz)curBU=biz;
          const scope=String(row[ci.scope]||'').replace(/\s+/g,' ').trim();
          if(!scope)continue;
          const prRaw=String(row[ci.pr]||'').toLowerCase();
          const pr=prRaw.includes('high')?'P1':prRaw.includes('med')?'P2':prRaw.includes('low')?'P3':'P3';
          const note=String(row[ci.note]||'').replace(/\s+/g,' ').trim();
          const per=ci.per>=0?String(row[ci.per]||'').replace(/\s+/g,' ').trim():'';
          const period=ci.period>=0?String(row[ci.period]||'').trim():'';
          const newp=ci.newp>=0?String(row[ci.newp]||'').trim():'';
          const fn=detectFn(scope);
          const seg=scope.split(':')[0].trim();
          const name=(seg.length>=6&&seg.length<=90)?seg:scope.slice(0,90);
          const notes=[scope.length>name.length?scope:'',note,per?('Liên quan: '+per):'',newp?('Sẽ nhận: '+newp):''].filter(Boolean).join(' — ');
          DB.tasks.push({_id:uid(),'Request ID':autoId(),'Request Date':today(),BU:mapBU(curBU),'Project/Campaign':period||'','Request Name':name,Function:fn.f,'Sub Function':fn.s,Requestor:owner,Source:'Recurring',Priority:pr,Owner:owner,Status:'WIP','Due Date':'',Complexity:'',CreditOverride:'',Progress:'',QC:'',Revisions:'',Satisfaction:'',Health:'',Blocker:'',Notes:notes,comments:[],history:[{by:me().name,at:new Date().toLocaleString('en-GB'),text:'Imported from Scope file'}]});
          n++;
        }
      });
      save();render();
      alert('Imported '+n+' scope items from '+people+' people.');
    }catch(err){alert('Error: '+err.message);}
  };
  rd.readAsArrayBuffer(f);
}

const XF=['Request ID','Request Date','BU','Project/Campaign','Request Name','Function','Sub Function','Requestor','Source','Priority','Owner','Status','Start Date','Due Date','Close Date','Frequency','Complexity','Capacity Level','Notes','Attachment'];
function importXls(e){
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      const ws=wb.Sheets[wb.SheetNames.includes('FORM')?'FORM':wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const hdr=rows[0].map(h=>String(h||'').replace(/\(\*\)/g,'').trim());
      const idx={};XF.forEach(f=>{const i=hdr.findIndex(h=>h.toLowerCase()===f.toLowerCase());if(i>=0)idx[f]=i;});
      let n=0;
      for(let r=1;r<rows.length;r++){
        const rid=rows[r][idx['Request ID']];
        if(!rid||String(rid).trim()==='')continue;
        const o={_id:uid()};XF.forEach(f=>{o[f]=idx[f]!=null?fmtv(rows[r][idx[f]]):'';});
        // normalize priority to P1..P4
        o.Priority=(o.Priority||'').match(/P[1-4]/)?o.Priority.match(/P[1-4]/)[0]:o.Priority;
        DB.tasks.push(o);n++;
      }
      save();render();alert('Imported '+n+' tasks.');
    }catch(err){alert('Error: '+err.message);}
  };
  rd.readAsArrayBuffer(f);
}
function fmtv(v){if(v==null)return'';if(typeof v==='number'&&v>40000&&v<60000){const d=new Date(Math.round((v-25569)*86400*1000));return d.toISOString().slice(0,10);}return String(v).replace(/\s+/g,' ').trim();}
